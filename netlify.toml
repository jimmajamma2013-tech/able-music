# ABLE — Netlify configuration

[build]
  publish = "."
  functions = "netlify/functions"

# ── Security & performance headers ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    # geolocation=(self) — fan.html Near Me feature needs it; camera/mic not used (#23)
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(self)"
    # HSTS — force HTTPS for 1 year including subdomains (#21)
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"
    # CSP: blocks external script injection; unsafe-inline required (vanilla HTML, no build step)
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://eu.i.posthog.com https://eu-assets.i.posthog.com https://www.clarity.ms https://scripts.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; frame-src https://www.youtube.com https://open.spotify.com https://w.soundcloud.com https://player.vimeo.com https://bandcamp.com https://embed.music.apple.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com https://eu.i.posthog.com https://www.clarity.ms https://scripts.clarity.ms; media-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# Admin must not be embeddable in any iframe — prevents clickjacking (#19)
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Frame-Options = "DENY"

[[headers]]
  for = "/admin"
  [headers.values]
    X-Frame-Options = "DENY"

# Cache static assets aggressively
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must never be long-cached — browser checks for updates on each load
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images: 1 year cache — content-hashed filenames assumed for user uploads; static demo assets are immutable
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.gif"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate so deploys take effect immediately
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirects ────────────────────────────────────────────────────
# Root → new landing page (force overrides physical index.html)
[[redirects]]
  from   = "/"
  to     = "/landing.html"
  status = 301
  force  = true

# Supabase auth callback (magic link lands here)
[[redirects]]
  from   = "/auth/callback"
  to     = "/admin.html"
  status = 200

# Clean URLs — must come before the /:slug catch-all (Netlify: first match wins)
# /admin.html → /admin (301 canonical clean URL — J7 #12)
[[redirects]]
  from   = "/admin.html"
  to     = "/admin"
  status = 301

# /start.html → /start (301 canonical clean URL — J7 #13)
[[redirects]]
  from   = "/start.html"
  to     = "/start"
  status = 301

# /admin → admin.html (serve the file at the clean URL)
[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200

# /start → start.html (serve the file at the clean URL)
[[redirects]]
  from   = "/start"
  to     = "/start.html"
  status = 200

# /privacy → privacy.html clean URL (J5 #11)
[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 200

# /terms → terms.html clean URL (J5 #12)
[[redirects]]
  from   = "/terms"
  to     = "/terms.html"
  status = 200

# /offline → offline.html (J3 — service worker fallback page)
[[redirects]]
  from   = "/offline"
  to     = "/offline.html"
  status = 200

# 404 fallback — also used as offline page by service worker
[[redirects]]
  from   = "/*"
  to     = "/offline.html"
  status = 404

# Friendly artist profile URLs: ablemusic.co/artistname → able-v8.html
# (once dynamic routing is in place via Supabase edge functions)
[[redirects]]
  from   = "/:slug"
  to     = "/able-v8.html"
  status = 200
