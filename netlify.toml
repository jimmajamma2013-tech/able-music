# ABLE — Netlify configuration

[build]
  publish = "."

# ── Security & performance headers ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-XSS-Protection           = "1; mode=block"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate so deploys take effect immediately
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirects ────────────────────────────────────────────────────
# Root → new landing page
[[redirects]]
  from   = "/"
  to     = "/landing.html"
  status = 200

# Supabase auth callback (magic link lands here)
[[redirects]]
  from   = "/auth/callback"
  to     = "/admin.html"
  status = 200

# Friendly artist profile URLs: able.fm/artistname → able-v6.html
# (once dynamic routing is in place via Supabase edge functions)
[[redirects]]
  from   = "/:slug"
  to     = "/able-v6.html"
  status = 200
