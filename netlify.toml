# ABLE — Netlify configuration

[build]
  publish = "."
  functions = "netlify/functions"

# ── Security & performance headers ───────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    # CSP: blocks external script injection; unsafe-inline required (vanilla HTML, no build step)
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; frame-src https://www.youtube.com https://open.spotify.com https://w.soundcloud.com https://player.vimeo.com https://bandcamp.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://fonts.googleapis.com; media-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"

# Cache static assets aggressively
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate so deploys take effect immediately
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirects ────────────────────────────────────────────────────
# Root → new landing page (force overrides physical index.html)
[[redirects]]
  from   = "/"
  to     = "/landing.html"
  status = 301
  force  = true

# Supabase auth callback (magic link lands here)
[[redirects]]
  from   = "/auth/callback"
  to     = "/admin.html"
  status = 200

# Friendly artist profile URLs: ablemusic.co/artistname → able-v8.html
# (once dynamic routing is in place via Supabase edge functions)
[[redirects]]
  from   = "/:slug"
  to     = "/able-v8.html"
  status = 200
