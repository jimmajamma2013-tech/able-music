<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Artist Name — ABLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────── */
    :root {
      /* Colours */
      --color-bg:             #0d0e1a;
      --color-card:           #12152a;
      --color-card-raised:    #181c35;
      --color-border:         rgba(255,255,255,0.08);
      --color-border-mid:     rgba(255,255,255,0.12);
      --color-accent:         #3b82f6;
      --color-accent-rgb:     59,130,246;
      --color-accent-glow:    rgba(59,130,246,0.35);
      --color-accent-subtle:  rgba(59,130,246,0.12);
      --color-text:           #ffffff;
      --color-text-secondary: rgba(255,255,255,0.55);
      --color-text-muted:     rgba(255,255,255,0.35);
      --color-tab-bar-bg:     rgba(10,11,22,0.97);

      /* Typography */
      --font:         'Plus Jakarta Sans', system-ui, sans-serif;

      /* Radius */
      --radius-card:      16px;
      --radius-button:    12px;
      --radius-button-sm: 8px;
      --radius-pill:      20px;
      --radius-art:       8px;

      /* Spacing */
      --space-page:   12px;
      --space-card:   14px;
      --space-gap:    12px;
    }

    /* ── RESET ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <p style="color:white;padding:20px;font-family:sans-serif;">ABLE v3 — skeleton</p>
</body>
