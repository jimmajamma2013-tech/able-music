================================================================================
  ABLE MUSIC — v3 PROFILE PAGE (able-v3.html)
  Branch: v2-simplified
================================================================================
  DESIGN SYSTEM
  Midnight Navy base · Plus Jakarta Sans · Artwork Hero · iOS shell
  Spec: docs/superpowers/specs/2026-03-10-able-v3-design.md
================================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Artist Name — ABLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────── */
    :root {
      /* Colours */
      --color-bg:             #0d0e1a;
      --color-card:           #12152a;
      --color-card-raised:    #181c35;
      --color-border:         rgba(255,255,255,0.08);
      --color-border-mid:     rgba(255,255,255,0.12);
      --color-accent:         #3b82f6;
      --color-accent-rgb:     59,130,246;
      --color-accent-glow:    rgba(59,130,246,0.35);
      --color-accent-subtle:  rgba(59,130,246,0.12);
      --color-text:           #ffffff;
      --color-text-secondary: rgba(255,255,255,0.55);
      --color-text-muted:     rgba(255,255,255,0.35);
      --color-tab-bar-bg:     rgba(10,11,22,0.97);

      /* Typography */
      --font:         'Plus Jakarta Sans', system-ui, sans-serif;

      /* Radius */
      --radius-card:      16px;
      --radius-button:    12px;
      --radius-button-sm: 8px;
      --radius-pill:      20px;
      --radius-art:       8px;

      /* Spacing */
      --space-page:   12px;
      --space-card:   14px;
      --space-gap:    12px;
    }

    /* ── RESET ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    img { max-width: 100%; display: block; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }
    a { color: inherit; text-decoration: none; }

    /* ── PAGE SHELL ──────────────────────────────────────────────── */
    .v3-shell {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: var(--color-bg);
    }

    /* Desktop: show as phone */
    @media (min-width: 480px) {
      body { background: #060810; padding: 40px 0 60px; }
      .v3-shell {
        border-radius: 36px;
        border: 1.5px solid rgba(255,255,255,0.1);
        box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
        overflow: hidden;
      }
    }

    /* ── STATUS BAR ──────────────────────────────────────────────── */
    .v3-status-bar {
      height: 36px;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .v3-status-bar__time {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
    }
    .v3-status-bar__icons {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--color-text);
      opacity: 0.7;
    }

    /* ── SCROLL AREA ─────────────────────────────────────────────── */
    .v3-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px; /* space for tab bar */
    }

    /* ── BOTTOM TAB BAR ──────────────────────────────────────────────────── */
    .v3-tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--color-tab-bar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      padding: 10px 8px env(safe-area-inset-bottom, 10px);
      z-index: 200;
    }
    .v3-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.1s;
    }
    .v3-tab:active { opacity: 0.6; }
    .v3-tab__icon { font-size: 20px; line-height: 1; }
    .v3-tab__label {
      font-size: 9px;
      font-weight: 600;
      color: var(--color-text-muted);
      letter-spacing: 0.3px;
      transition: color 0.15s;
    }
    .v3-tab.is-active .v3-tab__label { color: var(--color-accent); }

    /* Active dot indicator */
    .v3-tab__dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--color-accent);
      opacity: 0;
      transition: opacity 0.15s;
      margin-top: -1px;
    }
    .v3-tab.is-active .v3-tab__dot {
      opacity: 1;
    }

    /* ── TAB PANELS ──────────────────────────────────────────────── */
    .v3-panel { display: none; }
    .v3-panel.is-active { display: block; }
  </style>
</head>
<body>
  <div class="v3-shell">
    <!-- Status Bar -->
    <div class="v3-status-bar">
      <span class="v3-status-bar__time" id="v3Clock">9:41</span>
      <div class="v3-status-bar__icons">
        <span>●●●</span>
        <svg width="16" height="11" viewBox="0 0 16 11" fill="currentColor">
          <rect x="0" y="4" width="3" height="7" rx="1" opacity="0.4"/>
          <rect x="4" y="2.5" width="3" height="8.5" rx="1" opacity="0.6"/>
          <rect x="8" y="1" width="3" height="10" rx="1" opacity="0.8"/>
          <rect x="12" y="0" width="3" height="11" rx="1"/>
        </svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
          <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/>
          <path d="M23 4v4a2 2 0 0 0 0-4z" fill="currentColor" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <!-- Scroll area (content goes here) -->
    <div class="v3-scroll" id="v3Scroll">
      <div class="v3-panel is-active" id="panel-home" role="tabpanel" aria-labelledby="tab-home">
        <p style="padding:20px;color:var(--color-text-secondary);font-size:13px;">Home panel</p>
      </div>
      <div class="v3-panel" id="panel-music" role="tabpanel" aria-labelledby="tab-music">
        <p style="padding:20px;color:var(--color-text-secondary);font-size:13px;">Music panel</p>
      </div>
      <div class="v3-panel" id="panel-events" role="tabpanel" aria-labelledby="tab-events">
        <p style="padding:20px;color:var(--color-text-secondary);font-size:13px;">Events panel</p>
      </div>
      <div class="v3-panel" id="panel-merch" role="tabpanel" aria-labelledby="tab-merch">
        <p style="padding:20px;color:var(--color-text-secondary);font-size:13px;">Merch panel</p>
      </div>
      <div class="v3-panel" id="panel-support" role="tabpanel" aria-labelledby="tab-support">
        <p style="padding:20px;color:var(--color-text-secondary);font-size:13px;">Support panel</p>
      </div>
    </div><!-- close .v3-scroll -->
  </div>

  <!-- Tab bar OUTSIDE shell so fixed positioning isn't clipped by overflow:hidden on desktop -->
  <nav class="v3-tab-bar" role="tablist" aria-label="Main navigation">
    <button class="v3-tab is-active" id="tab-home" data-panel="home" role="tab" aria-selected="true" aria-controls="panel-home">
      <span class="v3-tab__icon" aria-hidden="true">⌂</span>
      <span class="v3-tab__label">Home</span>
      <span class="v3-tab__dot" aria-hidden="true"></span>
    </button>
    <button class="v3-tab" id="tab-music" data-panel="music" role="tab" aria-selected="false" aria-controls="panel-music">
      <span class="v3-tab__icon" aria-hidden="true">♪</span>
      <span class="v3-tab__label">Music</span>
      <span class="v3-tab__dot" aria-hidden="true"></span>
    </button>
    <button class="v3-tab" id="tab-events" data-panel="events" role="tab" aria-selected="false" aria-controls="panel-events">
      <span class="v3-tab__icon" aria-hidden="true">◈</span>
      <span class="v3-tab__label">Events</span>
      <span class="v3-tab__dot" aria-hidden="true"></span>
    </button>
    <button class="v3-tab" id="tab-merch" data-panel="merch" role="tab" aria-selected="false" aria-controls="panel-merch">
      <span class="v3-tab__icon" aria-hidden="true">◻</span>
      <span class="v3-tab__label">Merch</span>
      <span class="v3-tab__dot" aria-hidden="true"></span>
    </button>
    <button class="v3-tab" id="tab-support" data-panel="support" role="tab" aria-selected="false" aria-controls="panel-support">
      <span class="v3-tab__icon" aria-hidden="true">♡</span>
      <span class="v3-tab__label">Support</span>
      <span class="v3-tab__dot" aria-hidden="true"></span>
    </button>
  </nav>

  <script>
    // Live clock
    function updateClock() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2,'0');
      const m = now.getMinutes().toString().padStart(2,'0');
      const el = document.getElementById('v3Clock');
      if (el) el.textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 60000);

    // Tab switching
    const tabs = document.querySelectorAll('.v3-tab');
    const panels = document.querySelectorAll('.v3-panel');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.panel;

        tabs.forEach(t => {
          t.classList.remove('is-active');
          t.setAttribute('aria-selected', 'false');
        });
        panels.forEach(p => p.classList.remove('is-active'));

        tab.classList.add('is-active');
        tab.setAttribute('aria-selected', 'true');
        const panel = document.getElementById('panel-' + target);
        if (panel) {
          panel.classList.add('is-active');
          document.getElementById('v3Scroll').scrollTop = 0;
        }
      });
    });
  </script>
</body>
</html>
