          const nameVal   = (document.getElementById('sheet-artist-name')?.value || '').trim()
          const artVal    = (document.getElementById('sheet-artwork-url')?.value || '').trim()
          const themeVal  = document.getElementById('sheet-theme-select')?.value || 'dark'
          const vibeChecked = document.querySelector('input[name="vibe"]:checked')
          const vibeVal   = vibeChecked ? vibeChecked.value : (profile.vibe || 'indie')
          const hexVal    = document.getElementById('sheet-accent-hex')?.value || profile.accentColor

          profile.name        = nameVal || profile.name
          profile.artwork     = artVal && isSafeUrl(artVal) ? artVal : profile.artwork
          profile.theme       = themeVal
          profile.vibe        = vibeVal
          profile.accentColor = validHex(hexVal) ? hexVal : profile.accentColor

          saveProfile()
          renderProfile()
          closeSheet()
        })
      }
    }

    // ── LINKS SHEET BUILDER ──────────────────────────────────────
    function buildLinksSheet() {
      const links = profile.links || {}
      const ORDERED = ['instagram','youtube','tiktok']
      const rows = ORDERED.map(p => {
        const label = p.charAt(0).toUpperCase() + p.slice(1)
        const val   = links[p] || ''
        return `
          <div class="link-input-row">
            <div class="link-input-icon">${PLATFORM_ICONS[p] || PLATFORM_ICONS.default}</div>
            <input class="sheet-input" data-platform="${escHtml(p)}" type="url" value="${escHtml(val)}" placeholder="${escHtml(label)} URL" aria-label="${escHtml(label)} link">
          </div>
        `
      }).join('')

      return `
        ${rows}
        <button class="sheet-save-btn" id="links-save-btn" type="button">Save</button>
      `
    }

    function wireLinksSheet() {
      // Auto-detect platform on paste / blur
      document.querySelectorAll('#bottom-sheet-content input[data-platform]').forEach(input => {
        input.addEventListener('paste', function() {
          setTimeout(() => {
            const detected = detectPlatform(this.value)
            if (detected && detected !== this.dataset.platform) {
              showToast('Detected as ' + detected)
            }
          }, 50)
        })
      })

      const saveBtn = document.getElementById('links-save-btn')
      if (saveBtn) {
        saveBtn.addEventListener('click', function() {
          const inputs = document.querySelectorAll('#bottom-sheet-content input[data-platform]')
          inputs.forEach(inp => {
            const platform = inp.dataset.platform
            const val = inp.value.trim()
            if (!profile.links) profile.links = {}
            if (val && isSafeUrl(val)) {
              profile.links[platform] = val
            } else if (!val) {
              delete profile.links[platform]
            }
          })
          saveProfile()
          renderLinks()
          closeSheet()
        })
      }
    }

    // ── FAN CAPTURE SHEET BUILDER ────────────────────────────────
    function buildFanCaptureSheet() {
      const currentSub = profile.fanCaptureSub || ''
      const state = computeState(profile)
      const headings = {
        'default':     'Stay close.',
        'pre-release': 'You signed up right before something.',
        'gig':         'I\'m playing tonight.',
        'live':        'Something just dropped.'
      }
      const previewHeading = headings[state] || headings['default']

      return `
        <div class="sheet-live-preview">
          <div class="sheet-live-preview__label">Preview</div>
          <div class="sheet-live-preview__heading" id="sheet-fc-preview">${escHtml(previewHeading)}</div>
        </div>
        <div class="sheet-field">
          <label class="sheet-label" for="sheet-fc-sub">Sub-text (optional)</label>
          <input class="sheet-input" id="sheet-fc-sub" type="text" value="${escHtml(currentSub)}" placeholder="I'll reach out directly. No algorithm.">
        </div>
        <button class="sheet-save-btn" id="fc-save-btn" type="button">Save</button>
      `
    }

    function wireFanCaptureSheet() {
      const saveBtn = document.getElementById('fc-save-btn')
      if (saveBtn) {
        saveBtn.addEventListener('click', function() {
          const subVal = (document.getElementById('sheet-fc-sub')?.value || '').trim()
          profile.fanCaptureSub = subVal || ''
          saveProfile()
          renderFanCapture()
          closeSheet()
        })
      }
    }

    // ── TOAST ────────────────────────────────────────────────────
    function showToast(message, tone) {
      const existing = document.getElementById('ableToast')
      if (existing) existing.remove()
      const toast = document.createElement('div')
      toast.id = 'ableToast'
      toast.className = 'able-toast able-toast--' + (tone || 'amber')
      toast.setAttribute('role', 'alert')
      toast.setAttribute('aria-live', 'polite')
      const dot = document.createElement('span')
      dot.className = 'toast-dot'
      const msg = document.createElement('span')
      msg.className = 'toast-message'
      msg.textContent = message
      const closeBtn = document.createElement('button')
      closeBtn.className = 'toast-close'
      closeBtn.setAttribute('aria-label', 'Dismiss')
      closeBtn.textContent = '✕'
      closeBtn.onclick = () => document.getElementById('ableToast')?.remove()
      toast.appendChild(dot)
      toast.appendChild(msg)
      toast.appendChild(closeBtn)
      document.body.appendChild(toast)
      setTimeout(() => toast?.remove(), 4000)
    }

    // ── INIT ─────────────────────────────────────────────────────
    renderProfile()
  </script>
</body>
</html>
