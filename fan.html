<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0e1a">
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ABLE">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Your artists, your list. Stay close to the musicians you care about — new releases, upcoming shows, and what's happening next.">
  <title>ABLE — Your artists</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"></noscript>

  <style>
    /* ============================================================
       ABLE Fan Feed — fan.html
       Authority: docs/v6/core/V6_BUILD_AUTHORITY.md
       ============================================================ */

    /* === RESET + BASE ========================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100%;
      background: #111;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, a {
      font-family: inherit;
      font-size: inherit;
      border: none;
      background: none;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    /* === TOKENS ================================================ */
    :root {
      /* Spacing */
      --sp-1: 4px;  --sp-2: 8px;   --sp-3: 12px; --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px;  --sp-8: 32px; --sp-10: 40px;

      /* Typography */
      --text-xs:   11px;
      --text-sm:   13px;
      --text-base: 15px;
      --text-lg:   17px;
      --text-xl:   20px;

      /* Radius */
      --r-sm:  8px;
      --r-md:  14px;
      --r-lg:  20px;
      --r-pill: 999px;

      /* Motion */
      --ease-decel:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-standard: cubic-bezier(0.4, 0.0, 0.2, 1.0);
      --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
      --dur-fast:   150ms;
      --dur-mid:    250ms;
      --dur-slow:   400ms;

      /* Platform accent — neutral, not artist-owned */
      --platform-accent: #8b7cf4;
      --platform-accent-soft: rgba(139, 124, 244, 0.12);

      /* Dark theme colours */
      --color-bg:       #0d0e1a;
      --color-surface:  #111427;
      --color-card:     #12152a;
      --color-border:   rgba(255, 255, 255, 0.06);
      --color-border-2: rgba(255, 255, 255, 0.10);
      --color-text:     #f0ede8;
      --color-text-2:   rgba(240, 237, 232, 0.60);
      --color-text-3:   rgba(240, 237, 232, 0.50);
      --shadow-card:    0 2px 16px rgba(0, 0, 0, 0.4);
    }

    /* === SHELL ================================================= */
    .shell {
      position: relative;
      width: min(390px, 100vw);
      min-height: 100dvh;
      background: var(--color-bg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      /* iOS standalone: push content below notch */
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text);
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .status-icons { display: flex; gap: 5px; align-items: center; }
    .status-icon {
      width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
    }

    /* Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-5) var(--sp-2);
      flex-shrink: 0;
    }

    .page-header__wordmark {
      font-size: var(--text-lg);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--color-text);
    }

    .page-header__actions { display: flex; gap: var(--sp-2); align-items: center; }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--color-border);
      color: var(--color-text-2);
      transition: background var(--dur-fast) var(--ease-standard),
                  color var(--dur-fast) var(--ease-standard);
    }
    .icon-btn:hover { background: rgba(255,255,255,0.09); color: var(--color-text); }

    .notif-pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--platform-accent);
      position: absolute;
      top: -1px; right: -1px;
    }
    .notif-wrap { position: relative; }

    /* === CONTENT TABS ========================================= */
    .content-tabs {
      display: flex;
      gap: var(--sp-1);
      padding: var(--sp-2) var(--sp-5) var(--sp-3);
      flex-shrink: 0;
      border-bottom: 1px solid var(--color-border);
    }

    .ctab {
      padding: 7px 16px;
      border-radius: var(--r-pill);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-3);
      transition: all var(--dur-fast) var(--ease-standard);
      white-space: nowrap;
    }

    .ctab:hover { color: var(--color-text-2); }

    .ctab.active {
      background: var(--platform-accent-soft);
      color: var(--platform-accent);
      border: 1px solid rgba(139, 124, 244, 0.22);
    }

    /* === MAIN CONTENT AREA ==================================== */
    #fan-main {
      display: contents; /* transparent to flex layout */
    }

    /* === SCROLL AREA ========================================== */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(72px + env(safe-area-inset-bottom));
    }

    .scroll-area::-webkit-scrollbar { display: none; }

    /* === VIEW PANELS ========================================== */
    .view { display: none; }
    .view.active { display: block; }

    /* === FEED DATE LABELS ===================================== */
    .feed-section { padding: var(--sp-5) var(--sp-5) 0; }

    .feed-section + .feed-section { margin-top: var(--sp-4); }

    .feed-date-label {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-3);
      margin-bottom: var(--sp-3);
    }

    /* === FEED ITEM ============================================ */
    .feed-items { display: flex; flex-direction: column; gap: var(--sp-2); }

    .feed-item {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-4);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-spring),
                  box-shadow var(--dur-fast) var(--ease-standard);
      -webkit-tap-highlight-color: transparent;
    }

    .feed-item:active {
      transform: scale(0.98);
    }

    .feed-item:hover {
      border-color: var(--color-border-2);
    }

    /* Artwork / avatar */
    .feed-item__art {
      width: 46px;
      height: 46px;
      border-radius: var(--r-sm);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: rgba(0,0,0,0.7);
      letter-spacing: -0.02em;
      background: var(--item-accent, #555);
      /* Artist accent applied inline via JS */
    }

    .feed-item__art--circle {
      border-radius: 50%;
    }

    /* Info */
    .feed-item__info { flex: 1; min-width: 0; }

    .feed-item__artist {
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--color-text-2);
      margin-bottom: 2px;
      letter-spacing: 0.01em;
    }

    .feed-item__title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .feed-item__sub {
      font-size: var(--text-sm);
      color: var(--color-text-2);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Type badge + time */
    .feed-item__meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--sp-1);
      flex-shrink: 0;
    }

    .type-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: var(--r-pill);
    }

    .type-badge--release {
      background: rgba(6, 182, 212, 0.12);
      color: #06b6d4;
      border: 1px solid rgba(6, 182, 212, 0.22);
    }

    .type-badge--event {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
      border: 1px solid rgba(251, 191, 36, 0.22);
    }

    .type-badge--merch {
      background: rgba(167, 139, 250, 0.12);
      color: #a78bfa;
      border: 1px solid rgba(167, 139, 250, 0.22);
    }

    .type-badge--snap {
      background: rgba(240, 237, 232, 0.06);
      color: rgba(240, 237, 232, 0.62);
      border: 1px solid rgba(240, 237, 232, 0.10);
    }

    .type-badge--clip {
      background: rgba(239, 68, 68, 0.12);
      color: #ff7070;
      border: 1px solid rgba(239, 68, 68, 0.22);
    }

    /* C16 #1 — "New" badge for releases newer than last visit */
    .type-badge--new {
      background: rgba(74, 222, 128, 0.14);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.28);
    }

    /* === CLIP FEED ITEM ======================================= */
    .feed-item--clip {
      display: block;
      padding: 0;
      overflow: hidden;
      border-left: 3px solid var(--clip-accent, #ef4444);
    }

    .clip-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #1a1c2e;
      overflow: hidden;
    }

    .clip-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .clip-thumb__placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: rgba(240,237,232,0.12);
    }

    .clip-thumb__play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.22);
    }

    .clip-thumb__play-icon {
      width: 44px; height: 44px;
      background: rgba(0,0,0,0.55);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }

    .feed-item--clip .fi-clip-body {
      padding: var(--sp-3) var(--sp-4) var(--sp-4);
    }

    .feed-item--clip .fi-clip-top {
      display: flex; align-items: center; gap: var(--sp-2);
      margin-bottom: var(--sp-2);
    }

    .feed-item--clip .fi-clip-artist {
      flex: 1;
      font-size: var(--text-xs); font-weight: 500;
      color: var(--color-text-2);
    }

    .feed-item--clip .fi-clip-caption {
      font-size: 13px; color: var(--color-text); line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: var(--sp-3);
    }

    .clip-watch-btn {
      font-size: 12px; font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--r-pill);
      background: rgba(239,68,68,0.12);
      color: #ff7070;
      border: 1px solid rgba(239,68,68,0.22);
      cursor: pointer;
      transition: background 0.15s;
    }

    .clip-watch-btn:hover,
    .clip-watch-btn:focus-visible { background: rgba(239,68,68,0.22); }

    /* === FAN CLIP PLAYER MODAL ================================ */
    .fan-clip-modal {
      position: fixed; inset: 0; z-index: 200;
      background: #000;
      display: flex; flex-direction: column;
      transform: translateY(100vh);
      transition: transform 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
      will-change: transform;
    }

    .fan-clip-modal.is-open { transform: translateY(0); }

    .fan-clip-modal__close {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      right: 16px;
      z-index: 10;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff; font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px);
    }

    .fan-clip-modal__video {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
    }

    .fan-clip-modal__video iframe {
      width: 100%; height: 100%;
      border: none; display: block;
    }

    .fan-clip-modal__footer {
      padding: var(--sp-4) var(--sp-5) max(var(--sp-6), env(safe-area-inset-bottom));
    }

    .fan-clip-modal__sound-btn {
      background: rgba(255,255,255,0.1);
      border: none; border-radius: var(--r-pill);
      padding: 6px 14px; color: #f0ede8;
      font-size: 13px; cursor: pointer;
      font-family: inherit;
    }

    .fan-clip-modal__caption {
      font-size: 14px;
      color: rgba(240,237,232,0.8);
      line-height: 1.45;
      margin-top: var(--sp-3);
    }

    .feed-item__time {
      font-size: var(--text-xs);
      color: var(--color-text-2);
    }

    /* Today items — slightly elevated */
    .feed-section--today .feed-item {
      background: rgba(255,255,255,0.025);
    }

    /* === PRE-RELEASE COUNTDOWN STRIP ========================== */
    .prerelease-strips {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 16px 4px;
    }
    .prerelease-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--color-card);
      border-radius: 10px;
      border-left: 3px solid var(--strip-accent, #8b7cf4);
      font-size: 13px;
    }
    .prerelease-strip__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--strip-accent, #8b7cf4);
      white-space: nowrap;
    }
    .prerelease-strip__info {
      flex: 1;
      min-width: 0;
    }
    .prerelease-strip__artist {
      font-weight: 600;
      color: var(--color-text-2);
      margin: 0 0 1px;
    }
    .prerelease-strip__release {
      color: var(--color-text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prerelease-strip__countdown {
      font-size: 12px;
      font-weight: 600;
      color: var(--strip-accent, #8b7cf4);
      white-space: nowrap;
    }
    .prerelease-strip__presave {
      font-size: 12px;
      font-weight: 700;
      color: var(--strip-accent, #8b7cf4);
      text-decoration: none;
      padding: 4px 10px;
      border: 1.5px solid var(--strip-accent, #8b7cf4);
      border-radius: 20px;
      white-space: nowrap;
    }
    .prerelease-strip__presave:hover { opacity: .75; }

    /* === ALL CAUGHT UP ======================================== */
    .caught-up {
      padding: var(--sp-10) var(--sp-5) var(--sp-6);
      text-align: center;
    }

    .caught-up__line {
      display: inline-block;
      width: 32px;
      height: 1px;
      background: var(--color-border-2);
      vertical-align: middle;
      margin: 0 var(--sp-3);
    }

    .caught-up__text {
      font-size: var(--text-sm);
      color: var(--color-text-3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .caught-up__sub {
      font-size: var(--text-xs);
      color: var(--color-text-3);
      margin-top: var(--sp-2);
    }

    /* C14 #37 — loading skeleton ghost cards */
    @keyframes fan-shimmer {
      0%   { opacity: 0.4; }
      50%  { opacity: 0.7; }
      100% { opacity: 0.4; }
    }
    .fan-ghost-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px var(--sp-5);
      animation: fan-shimmer 1.4s ease-in-out infinite;
    }
    .fan-ghost-card__thumb {
      width: 52px;
      height: 52px;
      border-radius: var(--r-md);
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .fan-ghost-card__lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .fan-ghost-card__line {
      height: 10px;
      border-radius: 5px;
      background: rgba(255,255,255,0.08);
    }
    .fan-ghost-card__line--short { width: 55%; }
    @media (prefers-reduced-motion: reduce) {
      .fan-ghost-card { animation: none; opacity: 0.5; }
    }

    /* Empty state */
    .empty-state {
      padding: var(--sp-10) var(--sp-5) var(--sp-6);
      text-align: center;
    }

    .empty-state__emoji { font-size: 32px; margin-bottom: var(--sp-4); }

    .empty-state__title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--sp-2);
    }

    .empty-state__body {
      font-size: var(--text-sm);
      color: var(--color-text-2);
      line-height: 1.55;
    }

    /* === DISCOVER VIEW ======================================== */
    .discover-filters {
      display: flex;
      gap: var(--sp-2);
      padding: var(--sp-4) var(--sp-5) var(--sp-3);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .discover-filters::-webkit-scrollbar { display: none; }

    .filter-pill {
      padding: 7px 16px;
      border-radius: var(--r-pill);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-text-2);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--color-border);
      white-space: nowrap;
      transition: all var(--dur-fast) var(--ease-standard);
    }

    .filter-pill:hover { background: rgba(255,255,255,0.08); color: var(--color-text); }

    .filter-pill.active {
      background: var(--platform-accent-soft);
      color: var(--platform-accent);
      border-color: rgba(139, 124, 244, 0.22);
    }

    /* Artist discovery grid */
    .discover-grid {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      padding: 0 var(--sp-5) var(--sp-4);
    }

    .artist-card {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-4);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      transition: border-color var(--dur-fast) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-spring);
    }

    .artist-card:active { transform: scale(0.98); }

    /* Accent strip on left */
    .artist-card__accent-strip {
      width: 3px;
      border-radius: var(--r-pill);
      align-self: stretch;
      flex-shrink: 0;
      min-height: 48px;
    }

    .artist-card__avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: rgba(0,0,0,0.7);
      flex-shrink: 0;
    }

    .artist-card__info { flex: 1; min-width: 0; }

    .artist-card__name {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 2px;
    }

    .artist-card__meta {
      display: flex;
      gap: var(--sp-3);
      align-items: center;
    }

    .artist-card__genre {
      font-size: var(--text-xs);
      color: var(--color-text-3);
    }

    .artist-card__followers {
      font-size: var(--text-xs);
      color: var(--color-text-3);
    }

    /* Follow button */
    .follow-btn {
      padding: 7px 14px;
      border-radius: var(--r-pill);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--platform-accent);
      border: 1px solid rgba(139, 124, 244, 0.35);
      background: var(--platform-accent-soft);
      flex-shrink: 0;
      transition: all var(--dur-fast) var(--ease-standard);
      white-space: nowrap;
    }

    .follow-btn:hover {
      background: rgba(139, 124, 244, 0.20);
    }

    .follow-btn.following {
      color: var(--color-text-3);
      border-color: var(--color-border);
      background: transparent;
    }

    /* Discover section label */
    .discover-label {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-3);
      padding: var(--sp-4) var(--sp-5) var(--sp-2);
    }

    /* "Why" reason signal on artist cards */
    .artist-card__reason {
      font-size: 10px;
      color: var(--platform-accent);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.85;
    }

    .artist-card__reason::before {
      content: '';
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--platform-accent);
      flex-shrink: 0;
    }

    /* Active now badge */
    .artist-card__active {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(74,222,128,0.20);
    }

    /* Creative/collaborator card */
    .creative-card {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      transition: border-color var(--dur-fast) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-spring);
      animation: bloom-in var(--dur-mid) var(--ease-decel) both;
    }

    .creative-card:active { transform: scale(0.98); }

    .creative-card__avatar {
      width: 40px; height: 40px;
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
      background: rgba(255,255,255,0.06);
      color: var(--color-text-2);
    }

    .creative-card__info { flex: 1; min-width: 0; }

    .creative-card__name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 2px;
    }

    .creative-card__role {
      font-size: var(--text-xs);
      color: var(--color-text-3);
    }

    .creative-card__credits {
      font-size: var(--text-xs);
      color: var(--color-text-2);
      text-align: right;
      flex-shrink: 0;
      line-height: 1.35;
    }

    /* Divider between artist grid and creatives */
    .discover-divider {
      height: 1px;
      background: var(--color-border);
      margin: var(--sp-2) var(--sp-5) 0;
    }

    /* === NEAR ME VIEW ========================================= */
    .near-header {
      padding: var(--sp-4) var(--sp-5) var(--sp-2);
    }

    .near-location {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-sm);
      color: var(--color-text-2);
      margin-bottom: var(--sp-1);
    }

    .near-location__dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--platform-accent);
      flex-shrink: 0;
    }

    .near-location__edit {
      margin-left: auto;
      font-size: var(--text-xs);
      color: var(--color-text-3);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* Location capture — shown when fan_location not set */
    .near-location-capture {
      padding: var(--sp-6) var(--sp-5);
    }
    .near-location-capture__label {
      font-size: var(--text-sm);
      color: var(--color-text-2);
      margin-bottom: var(--sp-3);
    }
    .near-location-capture__row {
      display: flex;
      gap: var(--sp-2);
    }
    .near-location-capture__input {
      flex: 1;
      padding: 10px var(--sp-4);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--r-sm);
      color: var(--color-text);
      font: inherit;
      font-size: var(--text-sm);
      outline: none;
    }
    .near-location-capture__input:focus {
      border-color: var(--platform-accent);
    }
    .near-location-capture__btn {
      padding: 10px var(--sp-5);
      background: var(--platform-accent);
      color: #fff;
      font-size: var(--text-sm);
      font-weight: 600;
      border-radius: var(--r-sm);
      white-space: nowrap;
    }

    .show-items { display: flex; flex-direction: column; gap: var(--sp-2); padding: 0 var(--sp-5) var(--sp-4); }

    .show-item {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-4);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-spring);
    }

    .show-item:active { transform: scale(0.98); }

    .show-item__date-block {
      width: 42px;
      flex-shrink: 0;
      text-align: center;
    }

    .show-item__day {
      font-size: 18px;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1;
    }

    .show-item__month {
      font-size: var(--text-xs);
      color: var(--color-text-3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .show-item__info { flex: 1; min-width: 0; }

    .show-item__artist {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 2px;
    }

    .show-item__venue {
      font-size: var(--text-sm);
      color: var(--color-text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .show-item__city {
      font-size: var(--text-xs);
      color: var(--color-text-3);
      margin-top: 2px;
    }

    .show-item__following-badge {
      font-size: 9px;
      font-weight: 600;
      color: var(--platform-accent);
      background: var(--platform-accent-soft);
      border: 1px solid rgba(139,124,244,0.20);
      border-radius: var(--r-pill);
      padding: 3px 8px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .ticket-btn {
      padding: 7px 14px;
      border-radius: var(--r-pill);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text);
      border: 1px solid var(--color-border-2);
      background: rgba(255,255,255,0.04);
      flex-shrink: 0;
      transition: all var(--dur-fast) var(--ease-standard);
      white-space: nowrap;
    }

    .ticket-btn:hover { background: rgba(255,255,255,0.08); }

    /* Show section date label */
    .shows-date-group { padding: var(--sp-2) var(--sp-5) var(--sp-2); }
    .shows-date-group-label {
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-3);
      margin-bottom: var(--sp-2);
    }

    /* === BOTTOM TAB BAR ======================================= */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(390px, 100vw);
      display: flex;
      align-items: stretch;
      border-top: 1px solid var(--color-border);
      background: rgba(13, 14, 26, 0.92);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .tb-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0 12px;
      gap: 4px;
      color: var(--color-text-3);
      transition: color var(--dur-fast) var(--ease-standard);
    }

    .tb-tab.active { color: var(--platform-accent); }

    .tb-tab svg {
      width: 22px; height: 22px;
      stroke-width: 1.75;
    }

    .tb-tab__label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* === FOCUS RINGS ========================================== */
    :focus-visible {
      outline: 2px solid rgba(139, 124, 244, 0.75);
      outline-offset: 3px;
      border-radius: var(--r-sm);
    }

    .ctab:focus-visible,
    .filter-pill:focus-visible,
    .follow-btn:focus-visible,
    .ticket-btn:focus-visible { border-radius: var(--r-pill); }

    /* === BLOOM ANIMATION ====================================== */
    @keyframes bloom-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-item, .artist-card, .show-item {
      animation: bloom-in var(--dur-mid) var(--ease-decel) both;
    }

    /* stagger applied inline */

    /* === REDUCED MOTION ======================================= */
    @media (prefers-reduced-motion: reduce) {
      .feed-item, .artist-card, .show-item { animation: none; }
      .tab-bar { backdrop-filter: none; background: var(--color-bg); }
    }

    /* === OFFLINE INDICATOR ==================================== */
    .offline-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      padding: 8px 16px;
      background: #2a1f00;
      color: #f4b942;
      font-size: 13px;
      text-align: center;
      transform: translateY(-100%);
      transition: transform 300ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .offline-bar.visible { transform: translateY(0); }

    /* === INSTALL HINT ========================================= */
    .install-hint {
      position: fixed;
      bottom: 80px; left: 16px; right: 16px;
      z-index: 9000;
      background: #12152a;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transform: translateY(120%);
      opacity: 0;
      transition: transform 350ms cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 200ms ease;
    }
    .install-hint.visible { transform: translateY(0); opacity: 1; }
    .install-hint__icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: #0d0e1a;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 15px; color: #fff; letter-spacing: -0.5px;
    }
    .install-hint__text { flex: 1; }
    .install-hint__title { font-size: 14px; font-weight: 600; color: #f0ede8; }
    .install-hint__sub { font-size: 12px; color: rgba(240,237,232,0.55); margin-top: 2px; }
    .install-hint__btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 999px;
      background: #8b7cf4;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .install-hint__dismiss {
      position: absolute; top: 8px; right: 10px;
      font-size: 18px; line-height: 1;
      color: rgba(240,237,232,0.35);
      cursor: pointer;
      padding: 4px;
    }
  </style>

<body>

<!-- Offline indicator -->
<div class="offline-bar" id="offline-bar" role="status" aria-live="polite">No connection — showing saved content</div>

<!-- Install hint -->
<div class="install-hint" id="install-hint" role="complementary" aria-label="Add ABLE to your home screen">
  <span class="install-hint__dismiss" id="install-hint-dismiss" aria-label="Dismiss">×</span>
  <div class="install-hint__icon">ABLE</div>
  <div class="install-hint__text">
    <div class="install-hint__title">Add to home screen</div>
    <div class="install-hint__sub" id="install-hint-sub">Your artists. One tap away.</div>
  </div>
  <button class="install-hint__btn" id="install-hint-btn">Add</button>
</div>

<div class="shell">

  <!-- Status bar (demo) -->
  <div class="status-bar" aria-hidden="true">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
        <rect x="0" y="4" width="3" height="8" rx="1" opacity="0.4"/>
        <rect x="4" y="2.5" width="3" height="9.5" rx="1" opacity="0.6"/>
        <rect x="8" y="0.5" width="3" height="11.5" rx="1"/>
        <rect x="12" y="0" width="3" height="12" rx="1"/>
      </svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="currentColor">
        <path d="M7.5 2.5C9.5 2.5 11.3 3.3 12.5 4.7L14 3.1C12.4 1.2 10.1 0 7.5 0C4.9 0 2.6 1.2 1 3.1L2.5 4.7C3.7 3.3 5.5 2.5 7.5 2.5Z" opacity="0.4"/>
        <path d="M7.5 5.5C8.8 5.5 10 6 10.8 6.9L12.3 5.3C11.1 4 9.4 3.2 7.5 3.2C5.6 3.2 3.9 4 2.7 5.3L4.2 6.9C5 6 6.2 5.5 7.5 5.5Z" opacity="0.7"/>
        <circle cx="7.5" cy="9.5" r="2"/>
      </svg>
      <span style="font-size:12px;font-weight:600;letter-spacing:-0.02em;">100%</span>
    </div>
  </div>

  <!-- Page header -->
  <header class="page-header">
    <span class="page-header__wordmark">ABLE</span>
    <div class="page-header__actions">
      <div class="notif-wrap">
        <button class="icon-btn" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-pip" aria-hidden="true"></span>
        </button>
      </div>
      <button class="icon-btn" aria-label="Your profile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="fan-main">
  <!-- Sub-greeting (conditional, rendered by JS only when genuinely true) -->
  <p class="page-subgreeting" id="page-subgreeting" style="display:none;padding:0 var(--sp-5) var(--sp-2);font-size:var(--text-sm);color:var(--color-text-2);font-weight:500;"></p>

  <!-- Content tabs -->
  <div class="content-tabs" role="tablist" aria-label="Feed views">
    <button class="ctab active" role="tab" aria-selected="true" data-tab="following" id="tab-following" aria-controls="view-following">Following</button>
    <button class="ctab" role="tab" aria-selected="false" data-tab="discover" id="tab-discover" aria-controls="view-discover">Discover</button>
    <button class="ctab" role="tab" aria-selected="false" data-tab="near" id="tab-near" aria-controls="view-near">Near me</button>
  </div>

  <!-- Scroll area -->
  <div class="scroll-area" aria-label="Pull down to refresh">

    <!-- === FOLLOWING VIEW ==================================== -->
    <div class="view active" id="view-following" role="tabpanel" aria-labelledby="tab-following">
      <!-- C14 #37 — loading skeleton: 2 ghost cards shown while able_fan_following is read -->
      <div id="fan-loading-skeleton" aria-hidden="true">
        <div class="fan-ghost-card">
          <div class="fan-ghost-card__thumb"></div>
          <div class="fan-ghost-card__lines">
            <div class="fan-ghost-card__line"></div>
            <div class="fan-ghost-card__line fan-ghost-card__line--short"></div>
          </div>
        </div>
        <div class="fan-ghost-card" style="animation-delay:0.2s">
          <div class="fan-ghost-card__thumb"></div>
          <div class="fan-ghost-card__lines">
            <div class="fan-ghost-card__line"></div>
            <div class="fan-ghost-card__line fan-ghost-card__line--short"></div>
          </div>
        </div>
      </div>
      <div id="prerelease-strips-container"></div>
      <div class="feed-section feed-section--today">
        <h2 class="feed-date-label">Today</h2>
        <div class="feed-items" id="feed-today"></div>
      </div>
      <div class="feed-section" id="section-this-week" style="display:none">
        <h2 class="feed-date-label">This week</h2>
        <div class="feed-items" id="feed-week"></div>
      </div>
      <div class="caught-up" id="caught-up" style="display:none">
        <p class="caught-up__text">
          <span class="caught-up__line" aria-hidden="true"></span>
          — you're up to date —
          <span class="caught-up__line" aria-hidden="true"></span>
        </p>
      </div>
      <!-- C16 #2 — "Coming up" shows from followed artists (next 30 days) -->
      <div class="feed-section" id="section-coming-up" style="display:none">
        <h2 class="feed-date-label">Coming up</h2>
        <div class="show-items" id="coming-up-shows"></div>
      </div>
      <div class="empty-state" id="empty-following" style="display:none">
        <p class="empty-state__title" id="empty-following-title">Your following list is empty.</p>
        <p class="empty-state__body" id="empty-following-body">Find artists from their pages, or look through Discover.</p>
        <button class="follow-btn" id="empty-discover-cta" style="margin-top:16px;padding:9px 20px;">Discover artists →</button>
      </div>
      <!-- First-visit welcome state (when arriving from artist sign-up) -->
      <div class="empty-state" id="first-visit-state" style="display:none">
        <p class="empty-state__title" id="first-visit-title"></p>
        <p class="empty-state__body" id="first-visit-body"></p>
      </div>
      <!-- Cold-start suggestion row (shown when following exactly 1 artist) -->
      <div id="cold-start-row" style="display:none;padding:var(--sp-4) var(--sp-5) 0;">
        <p style="font-size:var(--text-xs);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-3);margin-bottom:var(--sp-3);" id="cold-start-label"></p>
        <div class="discover-grid" id="cold-start-grid"></div>
      </div>
    </div>

    <!-- === DISCOVER VIEW ==================================== -->
    <div class="view" id="view-discover" role="tabpanel" aria-labelledby="tab-discover">
      <div class="discover-filters" role="group" aria-label="Discovery filters">
        <button class="filter-pill active" data-filter="connected">Connected</button>
        <button class="filter-pill" data-filter="emerging">New to ABLE</button>
        <button class="filter-pill" data-filter="genre">By sound</button>
        <button class="filter-pill" data-filter="new-drops">Just dropped</button>
      </div>

      <div id="discover-content"></div>
    </div>

    <!-- === NEAR ME VIEW ===================================== -->
    <div class="view" id="view-near" role="tabpanel" aria-labelledby="tab-near">
      <div class="near-header" id="near-header-set" style="display:none">
        <div class="near-location">
          <span class="near-location__dot" aria-hidden="true"></span>
          <span id="near-location-display"></span>
          <button class="near-location__edit" aria-label="Change location" onclick="resetNearLocation()">Change</button>
        </div>
      </div>
      <div class="near-location-capture" id="near-location-capture" style="display:none">
        <p class="near-location-capture__label">Where are you based?</p>
        <div class="near-location-capture__row">
          <input class="near-location-capture__input" id="near-location-input" type="text" placeholder="City, e.g. Manchester" autocomplete="off" aria-label="Your city" onkeydown="if(event.key==='Enter')saveNearLocation()">
          <button class="near-location-capture__btn" onclick="saveNearLocation()">Save</button>
        </div>
      </div>
      <div id="near-content"></div>
    </div>

  </div><!-- /scroll-area -->
  </main><!-- /fan-main -->

  <!-- Fan clip player modal (single clip, no swipe nav per spec §5) -->
  <div id="fanClipModal" class="fan-clip-modal" role="dialog" aria-modal="true" aria-label="Clip player">
    <button class="fan-clip-modal__close" id="fanClipClose" aria-label="Close clip">✕</button>
    <div class="fan-clip-modal__video" id="fanClipVideo"></div>
    <div class="fan-clip-modal__footer">
      <button class="fan-clip-modal__sound-btn" id="fanClipSoundBtn">🔇 Sound off</button>

      </svg>
      <span class="tb-tab__label">Following</span>
