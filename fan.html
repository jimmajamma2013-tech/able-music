    <button class="tb-tab" data-panel="artists" aria-label="Artists you follow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="7" r="4"/>
        <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
        <path d="M16 11l2 2 4-4" stroke-width="2"/>
      </svg>
      <span class="tb-tab__label">Artists</span>
    </button>
    <button class="tb-tab" data-panel="profile" aria-label="Your profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21v-1a8 8 0 0 1 16 0v1"/>
      </svg>
      <span class="tb-tab__label">Me</span>
    </button>
  </nav>

</div><!-- /shell -->

<script>
  /* ============================================================
     ABLE Fan Feed — fan.html
     localStorage key: able_fan_following = [{id, name, accent, genre, ...}]
     For demo: uses hardcoded DEMO data if localStorage is empty.
     ============================================================ */

  // === HELPERS ==============================================
  function safeGet(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch (e) { console.warn('[ABLE] localStorage parse error for "' + key + '"', e); return fallback; }
  }
  function safeSet(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); return true; }
    catch (e) { console.error('[ABLE] localStorage write error for "' + key + '"', e); return false; }
  }

  // === STATE ================================================
  // C16 #1 — previous visit timestamp for "New" badge calculation
  let _prevLastVisit = 0

  // === DEMO DATA ============================================

  const DEMO_FOLLOWED = [
    { id: 'nova-reign',  name: 'Nova Reign',  genre: 'Electronic',   accent: '#06b6d4' },
    { id: 'luna-waves',  name: 'Luna Waves',  genre: 'R&B / Soul',   accent: '#e06b7a' },
    { id: 'drift',       name: 'Drift',       genre: 'Hip Hop',      accent: '#f4b942' },
    { id: 'sable',       name: 'Sable',       genre: 'Indie / Alt',  accent: '#7ec88a' },
  ]

  const now = Date.now()
  const h = 3600000

  const DEMO_FEED = [
    { type: 'release', artistId: 'nova-reign', title: 'Fracture', sub: 'New single',        age: now - 2*h     },
    { type: 'clip',    artistId: 'nova-reign', title: 'Soundcheck at Fabric', caption: 'Felt different in that room last night. Something about the way the low end sits in there.', url: 'https://www.youtube.com/watch?v=jNQXAC9IVRw', age: now - 8*h },
    { type: 'event',   artistId: 'luna-waves', title: 'Jazz Cafe · London', sub: 'Tonight · Doors 8pm', age: now - 5*h },
    { type: 'release', artistId: 'drift',      title: 'Hollow Ground',  sub: 'New EP · 6 tracks', age: now - 28*h  },
    { type: 'merch',   artistId: 'sable',      title: 'Silhouette tee', sub: 'Limited run · £32', age: now - 48*h },
    { type: 'release', artistId: 'nova-reign', title: 'Archive Vol. 1', sub: 'Album · 12 tracks', age: now - 96*h  },
    { type: 'snap',    artistId: 'luna-waves', title: 'Studio session update', sub: 'Drop from the artist', age: now - 120*h },
  ]

  const DEMO_EMERGING = [
    { id: 'margot-veil',     name: 'Margot Veil',    genre: 'Indie / Alt',    accent: '#7ec88a', followers: '1.2k', location: 'Glasgow' },
    { id: 'kreyz',           name: 'KREYZ',          genre: 'Electronic',     accent: '#06b6d4', followers: '843',  location: 'Berlin' },
    { id: 'tendai',          name: 'Tendai',         genre: 'R&B / Soul',     accent: '#e06b7a', followers: '2.1k', location: 'London' },
    { id: 'fools-gold',      name: 'The Fools Gold', genre: 'Acoustic / Folk',accent: '#d4a96a', followers: '677',  location: 'Nashville' },
    { id: 'caspar-black',    name: 'Caspar Black',   genre: 'Rock / Metal',   accent: '#e05242', followers: '1.8k', location: 'Manchester' },
  ]

  const DEMO_NEAR = [
    { artistId: 'nova-reign',  artist: 'Nova Reign',  venue: 'Fabric',      city: 'London',  day: '15', month: 'Mar', time: '11pm', followed: true,  accent: '#06b6d4' },
    { artistId: 'margot-veil', artist: 'Margot Veil', venue: 'The Lexington', city: 'London', day: '19', month: 'Mar', time: '8pm',  followed: false, accent: '#7ec88a' },
    { artistId: 'luna-waves',  artist: 'Luna Waves',  venue: 'Jazz Cafe',   city: 'London',  day: '22', month: 'Mar', time: '9pm',  followed: true,  accent: '#e06b7a' },
    { artistId: 'tendai',      artist: 'Tendai',      venue: 'Village Underground', city: 'London', day: '28', month: 'Mar', time: '9pm', followed: false, accent: '#e06b7a' },
  ]

  // C16 #2 — Upcoming shows from followed artists (demo data, next 30 days)
  const DEMO_UPCOMING_SHOWS = [
    { artistId: 'luna-waves', artist: 'Luna Waves',  venue: 'Jazz Cafe',       city: 'London',    day: '22', month: 'Mar', doorsTime: '9pm',  ticketUrl: '#', accent: '#e06b7a' },
    { artistId: 'nova-reign', artist: 'Nova Reign',  venue: 'Fabric',          city: 'London',    day: '28', month: 'Mar', doorsTime: '11pm', ticketUrl: '#', accent: '#06b6d4' },
    { artistId: 'drift',      artist: 'Drift',       venue: 'EartH Hackney',   city: 'London',    day: '4',  month: 'Apr', doorsTime: '8pm',  ticketUrl: '#', accent: '#f4b942' },
  ]

  // === UTILITIES ============================================

  function getInitials(name) {
    if (!name) return '?'
    const p = name.trim().split(/\s+/)
    if (p.length === 1) return p[0].slice(0, 2).toUpperCase()
    return (p[0][0] + p[1][0]).toUpperCase()
  }

  function hexToRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex)
    return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '255,255,255'
  }

  function formatAge(ts) {
    const diff = Date.now() - ts
    const m = Math.floor(diff / 60000)
    const h = Math.floor(diff / 3600000)
    const d = Math.floor(diff / 86400000)
    if (m < 60) return `${m}m`
    if (h < 24) return `${h}h`
    return `${d}d`
  }

  function typeBadgeClass(type) {
    const map = { release: 'type-badge--release', event: 'type-badge--event', merch: 'type-badge--merch', snap: 'type-badge--snap', clip: 'type-badge--clip' }
    return map[type] || 'type-badge--snap'
  }

  function typeBadgeLabel(type) {
    const map = { release: 'New music', event: 'Show', merch: 'Merch', snap: 'From the artist', clip: 'Clip' }
    return map[type] || 'From the artist'
  }

  // === LOAD DATA ============================================

  function getFollowed() {
    const stored = safeGet('able_fan_following', [])
    return stored.length ? stored : DEMO_FOLLOWED
  }

  function getFeed() {
    const stored = safeGet('able_fan_feed', [])
    return stored.length ? stored : DEMO_FEED
  }

  function getFollowedIds() {
    return getFollowed().map(a => a.id)
  }

  // === PRE-RELEASE COUNTDOWN STRIPS =========================
  // V1: reads able_v3_profile from same browser (demo/artist preview only).
  // V2: reads from Supabase followed-artists feed.

  function renderPreReleaseStrips() {
    const container = document.getElementById('prerelease-strips-container')
    if (!container) return

    // V1: check if followed list has any artist in pre-release state via same-browser profile
    const strips = []

    // Same-browser artist profile check
    try {
      const profile = JSON.parse(localStorage.getItem('able_v3_profile') || '{}')
      const releaseDate = profile.releaseDate ? new Date(profile.releaseDate) : null
      const isPreRelease = releaseDate && releaseDate > new Date()
      const isPreReleaseOverride = profile.stateOverride === 'pre-release'

      if ((isPreRelease || isPreReleaseOverride) && profile.name) {
        const daysLeft = releaseDate
          ? Math.max(1, Math.ceil((releaseDate - Date.now()) / 86400000))
          : null
        strips.push({
          artistName:  profile.name,
          accent:      profile.accent || '#8b7cf4',
          releaseTitle: profile.releaseTitle || profile.release?.title || '',
          daysLeft,
          presaveUrl:  profile.presaveUrl || profile.ctaUrl || null,
        })
      }
    } catch (_) {}

    // Also check followed artists data for release data (injected by fan_feed entries)
    try {
      const followed = getFollowed()
      followed.forEach(a => {
        if (a.releaseDate) {
          const rd = new Date(a.releaseDate)
          if (rd > new Date()) {
            const alreadyAdded = strips.some(s => s.artistName === a.name)
            if (!alreadyAdded) {
              strips.push({
                artistName:  a.name,
                accent:      a.accent || '#8b7cf4',
                releaseTitle: a.releaseTitle || '',
                daysLeft:    Math.max(1, Math.ceil((rd - Date.now()) / 86400000)),
                presaveUrl:  a.presaveUrl || null,
              })
            }
          }
        }
      })
    } catch (_) {}

    if (!strips.length) {
      container.innerHTML = ''
      return
    }

    const shown = strips.slice(0, 3)
    const overflow = strips.length - shown.length

    const html = shown.map(s => {
      const presaveBtn = s.presaveUrl
        ? `<a class="prerelease-strip__presave" href="${s.presaveUrl}" target="_blank" rel="noopener">Pre-save</a>`
        : ''
      const countdownText = s.daysLeft
        ? `${s.daysLeft} day${s.daysLeft === 1 ? '' : 's'}`
        : 'Coming soon'
      return `
        <div class="prerelease-strip" style="--strip-accent:${s.accent}">
          <div class="prerelease-strip__info">
            <p class="prerelease-strip__artist">${escHtml(s.artistName)}</p>
            <p class="prerelease-strip__release">${escHtml(s.releaseTitle || 'New release')}</p>
          </div>
          <span class="prerelease-strip__countdown">${escHtml(countdownText)}</span>
          ${presaveBtn}
        </div>
      `
    }).join('')

    const overflowHtml = overflow > 0
      ? `<p style="font-size:12px;color:var(--color-text-3);padding:4px 14px 0;text-align:right">And ${overflow} more upcoming release${overflow === 1 ? '' : 's'} →</p>`
      : ''

    container.innerHTML = `<div class="prerelease-strips">${html}</div>${overflowHtml}`
  }

  // === RENDER FOLLOWING VIEW ================================

  function renderFollowing() {
    // C14 #37 — remove loading skeleton immediately
    const _skeleton = document.getElementById('fan-loading-skeleton')
    if (_skeleton) _skeleton.remove()

    renderPreReleaseStrips()

    const followed = getFollowed()
    // C14 #38 — update tab label with following count
    const _tabBtn = document.getElementById('tab-following')
    if (_tabBtn && followed.length > 0) {
      _tabBtn.textContent = `Following ${followed.length} artist${followed.length === 1 ? '' : 's'}`
    }
    // C18 #4 — notification badge when there are "New" items
    ;(function() {
      try {
        const _feed4 = getFeed()
        const _hasNew4 = _feed4.some(i => i.type === 'release' && _prevLastVisit > 0 && i.age > _prevLastVisit)
        const _dotId4 = 'tab-following-badge'
        let _dot4 = document.getElementById(_dotId4)
        if (_hasNew4 && _tabBtn) {
          if (!_dot4) {
            _dot4 = document.createElement('span')
            _dot4.id = _dotId4
            _dot4.setAttribute('aria-label', 'New items')
            _tabBtn.style.position = 'relative'
            _tabBtn.appendChild(_dot4)
          }
          _dot4.style.cssText = 'position:absolute;top:4px;right:4px;width:6px;height:6px;background:#4ade80;border-radius:50%;pointer-events:none;'
        } else if (_dot4) {
          _dot4.remove()
        }
      } catch(_) {}
    })()
    const followedMap = {}
    followed.forEach(a => { followedMap[a.id] = a })

    const feed = getFeed()
    const ONE_DAY = 86400000
    const SEVEN_DAYS = 7 * ONE_DAY

    // C16 #6 — sort by most recent first within each group
    const todayItems  = feed.filter(i => (Date.now() - i.age) < ONE_DAY).sort((a, b) => b.age - a.age)
    const weekItems   = feed.filter(i => {
      const age = Date.now() - i.age
      return age >= ONE_DAY && age < SEVEN_DAYS
    }).sort((a, b) => b.age - a.age)

    const todayEl  = document.getElementById('feed-today')
    const weekEl   = document.getElementById('feed-week')
    const weekSec  = document.getElementById('section-this-week')
    const caughtUp = document.getElementById('caught-up')
    const emptyEl  = document.getElementById('empty-following')

    if (!followed.length) {
      renderEmptyFollowingState()
      return
    }

    function buildItem(item, idx) {
      const artist = followedMap[item.artistId] || { name: item.artistId, accent: '#555', genre: '' }
      const rgb    = hexToRgb(artist.accent)

      const el = document.createElement('div')
      el.style.animationDelay = `${idx * 35}ms`
      el.setAttribute('role', 'article')

      if (item.type === 'clip') {
        el.className = 'feed-item feed-item--clip pressable'
        el.style.setProperty('--clip-accent', artist.accent || '#ef4444')
        el.setAttribute('aria-label', `${artist.name} — ${item.title || item.caption}, Clip`)
        const thumbHtml = item.thumbnailUrl
          ? `<img src="${escHtml(item.thumbnailUrl)}" alt="" loading="lazy">`
          : `<div class="clip-thumb__placeholder">▶</div>`
        el.innerHTML = `
          <div class="clip-thumb">
            ${thumbHtml}
            <div class="clip-thumb__play">
              <div class="clip-thumb__play-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>
              </div>
            </div>
          </div>
          <div class="fi-clip-body">
            <div class="fi-clip-top">
              <span class="fi-clip-artist">${escHtml(artist.name)}</span>
              <span class="type-badge type-badge--clip">Clip</span>
              <span class="feed-item__time" aria-hidden="true">${formatAge(item.age)}</span>
            </div>
            <p class="fi-clip-caption">${escHtml(item.caption || item.title || '')}</p>
            <button class="clip-watch-btn">Watch</button>
          </div>
        `
        el.querySelector('.clip-watch-btn').addEventListener('click', e => {
          e.stopPropagation()
          openFanClipPlayer(item)
        })
        el.querySelector('.clip-thumb').addEventListener('click', () => openFanClipPlayer(item))
        return el
      }

      // C16 #1 — "New" badge: release that arrived since last visit
      const _isNew = item.type === 'release' && _prevLastVisit > 0 && item.age > _prevLastVisit
      const _newBadge = _isNew ? `<span class="type-badge type-badge--new" aria-label="New since your last visit">New</span>` : ''

      el.className = 'feed-item pressable'
      el.setAttribute('aria-label', `${artist.name} — ${item.title}, ${typeBadgeLabel(item.type)}${_isNew ? ', new since your last visit' : ''}`)
      el.innerHTML = `
        ${item.artworkUrl ? `<img class="feed-item__art" src="${escHtml(item.artworkUrl)}" alt="" loading="lazy" style="object-fit:cover;border-radius:6px;">` : `<div class="feed-item__art" style="background:rgba(${rgb},0.22);color:#f0ede8">${getInitials(artist.name)}</div>`}
        <div class="feed-item__info">
          <p class="feed-item__artist">${escHtml(artist.name)}</p>
          <p class="feed-item__title">${escHtml(item.title)}</p>
          <p class="feed-item__sub">${escHtml(item.sub || '')}</p>
          ${item.source ? `<p class="feed-item__source" style="font-size:10px;color:var(--t3,#888);margin:2px 0 0;">via ${escHtml(item.source)}</p>` : ''}
        </div>
        <div class="feed-item__meta">
          ${_newBadge}
          <span class="type-badge ${typeBadgeClass(item.type)}" aria-label="${typeBadgeLabel(item.type)}">${typeBadgeLabel(item.type)}</span>
          <span class="feed-item__time" aria-hidden="true" title="${new Date(item.age).toLocaleString('en-GB', {dateStyle:'long',timeStyle:'short'})}">${formatAge(item.age)}</span>
        </div>
      `
      el.addEventListener('click', () => {
        // C16 #4 — track artist card tap
        try { const _c=safeGet('able_clicks',[]); _c.push({label:'artist-card',type:'navigation',ts:Date.now()}); safeSet('able_clicks',_c); } catch(_) {}
        const slug = artist.id || artist.slug || ''
        const dest = item.url || (slug ? `https://ablemusic.co/${encodeURIComponent(slug)}?src=fan-dashboard` : null)// C14 #39
        if (dest) window.open(dest, '_blank', 'noopener')
      })
      return el
    }

    todayItems.forEach((item, i) => todayEl.appendChild(buildItem(item, i)))

    if (weekItems.length) {
      weekSec.style.display = 'block'
      weekItems.forEach((item, i) => weekEl.appendChild(buildItem(item, i + todayItems.length)))
    }

    if (todayItems.length || weekItems.length) {
      caughtUp.style.display = 'block'
    } else {
      renderEmptyFollowingState()
    }

    // C16 #2 — render upcoming shows from followed artists
    renderComingUpShows(followed)
  }

  function renderComingUpShows(followed) {
    const sec = document.getElementById('section-coming-up')
    const container = document.getElementById('coming-up-shows')
    if (!sec || !container) return

    const followedIds = followed.map(a => a.id)
    const followedMap = {}
    followed.forEach(a => { followedMap[a.id] = a })

    // Use localStorage shows first; fall back to DEMO
    let upcomingShows = []
    try {
      const stored = safeGet('able_fan_upcoming_shows', [])
      upcomingShows = stored.length ? stored : DEMO_UPCOMING_SHOWS
    } catch (_) {
      upcomingShows = DEMO_UPCOMING_SHOWS
    }

    // Filter to shows from followed artists only
    const shows = upcomingShows.filter(s => followedIds.includes(s.artistId))
    if (!shows.length) return

    sec.style.display = 'block'
    container.innerHTML = ''

    shows.forEach((show, i) => {
      const artist = followedMap[show.artistId] || { name: show.artist, accent: show.accent || '#555' }
      const el = document.createElement('div')
      el.className = 'show-item'
      el.style.animationDelay = `${i * 40}ms`
      el.setAttribute('role', 'article')
      el.setAttribute('aria-label', `${escHtml(artist.name)} at ${escHtml(show.venue)}, ${escHtml(show.day)} ${escHtml(show.month)}`)
      el.innerHTML = `
        <div class="show-item__date-block" aria-hidden="true">
          <div class="show-item__day">${escHtml(show.day)}</div>
          <div class="show-item__month">${escHtml(show.month)}</div>
        </div>
        <div class="show-item__info">
          <p class="show-item__artist">${escHtml(artist.name)}</p>
          <p class="show-item__venue">${escHtml(show.venue)}</p>
          <p class="show-item__city">${escHtml(show.city)} · Doors ${escHtml(show.doorsTime)}</p>
        </div>
        ${show.ticketUrl && show.ticketUrl !== '#'
          ? `<a class="ticket-btn" href="${escHtml(show.ticketUrl)}" target="_blank" rel="noopener" aria-label="Get tickets for ${escHtml(artist.name)} at ${escHtml(show.venue)}">Tickets</a>`
          : `<span class="show-item__following-badge" style="background:rgba(${hexToRgb(artist.accent)},0.12);color:${escHtml(artist.accent)}">Following</span>`
        }
      `
      if (show.ticketUrl && show.ticketUrl !== '#') {
        el.style.cursor = 'default'
      } else {
        el.addEventListener('click', () => {
          const slug = show.artistId || ''
          if (slug) window.open(`https://ablemusic.co/${encodeURIComponent(slug)}?src=fan-coming-up`, '_blank', 'noopener')
        })
      }
      container.appendChild(el)
    })
  }

  // === RENDER DISCOVER VIEW =================================

  let activeFilter = 'connected'
  let followedIds  = []

  // Connected artists — those linked via credits to artists the fan follows
  const DEMO_CONNECTED = [
    { id: 'juicy-grey',   name: 'Juicy Grey',  genre: 'Electronic',  accent: '#06b6d4', followers: '421',  location: 'London',    via: 'Nova Reign', role: 'producer' },
    { id: 'sol-rave',     name: 'Sol Rave',    genre: 'R&B / Soul',  accent: '#e06b7a', followers: '988',  location: 'London',    via: 'Luna Waves', role: 'mix' },
    { id: 'low-key-labs', name: 'Low Key Labs',genre: 'Hip Hop',     accent: '#f4b942', followers: '1.5k', location: 'Hackney',   via: 'Drift',      role: 'producer' },
    { id: 'erin-grey',    name: 'Erin Grey',   genre: 'Indie / Alt', accent: '#7ec88a', followers: '304',  location: 'Edinburgh', via: 'Sable',      role: 'mixing' },
  ]

  const DEMO_CREATIVES = [
    { id: 'mk-prod',    name: 'MK Produce', role: 'Producer',           location: 'London',    creditedOn: 'Drift, Nova Reign' },
    { id: 'luz-mix',    name: 'Luz',        role: 'Mixing / Mastering', location: 'Berlin',    creditedOn: 'Luna Waves, Sable' },
    { id: 'dean-photo', name: 'Dean Patel', role: 'Photography',        location: 'Manchester', creditedOn: 'Nova Reign' },
    { id: 'lena-vid',   name: 'Lena Ross',  role: 'Videography',        location: 'London',    creditedOn: 'Luna Waves, Drift' },
  ]

  function renderDiscover(filter) {
    activeFilter = filter || activeFilter
    followedIds  = getFollowedIds()

    const container = document.getElementById('discover-content')
    container.innerHTML = ''

    if (activeFilter === 'emerging')  renderEmerging(container)
    else if (activeFilter === 'connected') renderConnected(container)
    else if (activeFilter === 'genre') renderByGenre(container)
    else if (activeFilter === 'new-drops') renderNewDrops(container)
  }

  function buildArtistCard(artist, idx, opts) {
    opts = opts || {}
    const rgb = hexToRgb(artist.accent)
    const isF = followedIds.includes(artist.id)

    const el = document.createElement('div')
    el.className = 'artist-card'
    el.style.animationDelay = `${idx * 40}ms`
    el.setAttribute('role', 'article')
    el.setAttribute('tabindex', '0') // C16 #10 — keyboard-focusable

    const reasonHtml = opts.reason
      ? `<p class="artist-card__reason">${escHtml(opts.reason)}</p>`
      : ''

    const activeHtml = opts.active
      ? `<span class="artist-card__active" aria-label="Active recently" title="Active recently"></span>`
      : ''

    el.innerHTML = `
      <div class="artist-card__accent-strip" style="background:${artist.accent}"></div>
      <div class="artist-card__avatar" style="background:rgba(${rgb},0.22);color:#f0ede8">
        ${getInitials(artist.name)}
      </div>
      <div class="artist-card__info">
        <div style="display:flex;align-items:center;gap:6px">
          <p class="artist-card__name">${escHtml(artist.name)}</p>
          ${activeHtml}
        </div>
        <div class="artist-card__meta">
          <span class="artist-card__genre">${escHtml(artist.genre)}</span>
          ${artist.location ? `<span class="artist-card__genre">${escHtml(artist.location)}</span>` : ''}
        </div>
        ${reasonHtml}
      </div>
      <button class="follow-btn ${isF ? 'following' : ''}" data-artist-id="${escHtml(artist.id)}"
        aria-pressed="${isF}" aria-label="${isF ? 'Following ' : 'Follow '}${escHtml(artist.name)}">
        ${isF ? 'Following' : 'Follow'}
      </button>
    `

    el.querySelector('.follow-btn').addEventListener('click', e => {
      e.stopPropagation()
      toggleFollow(artist, e.currentTarget)
    })

    return el
  }

  function buildCreativeCard(creative, idx) {
    const el = document.createElement('div')
    el.className = 'creative-card'
    el.style.animationDelay = `${idx * 40}ms`
    el.setAttribute('role', 'article')
    el.innerHTML = `
      <div class="creative-card__avatar">${getInitials(creative.name)}</div>
      <div class="creative-card__info">
        <p class="creative-card__name">${escHtml(creative.name)}</p>
        <p class="creative-card__role">${escHtml(creative.role)} · ${escHtml(creative.location)}</p>
      </div>
      <div class="creative-card__credits">${escHtml(creative.creditedOn)}</div>
    `
    return el
  }

  function renderEmerging(container) {
    const label = document.createElement('p')
    label.className = 'discover-label'
    label.textContent = 'New to ABLE'
    container.appendChild(label)

    const grid = document.createElement('div')
    grid.className = 'discover-grid'

    // "Why" reasons pulled from shared genre with followed artists
    const reasons = [
      'Similar to artists you follow',
      'Based in London',
      'R&B · new this month',
      null,
      'Active this week',
    ]

    DEMO_EMERGING.forEach((a, i) => {
      grid.appendChild(buildArtistCard(a, i, {
        reason: reasons[i] || null,
        active: i === 2 || i === 4,
      }))
    })
    container.appendChild(grid)

    renderCreativesSection(container)
  }

  function renderConnected(container) {
    const label = document.createElement('p')
    label.className = 'discover-label'
    label.textContent = 'Artists connected to yours'
    container.appendChild(label)

    const grid = document.createElement('div')
    grid.className = 'discover-grid'

    DEMO_CONNECTED.forEach((a, i) => {
      grid.appendChild(buildArtistCard(a, i, {
        reason: `${escHtml(a.role)} on ${escHtml(a.via)}`,
      }))
    })

    container.appendChild(grid)
    renderCreativesSection(container)
  }

  function renderCreativesSection(container) {
    const divider = document.createElement('div')
    divider.className = 'discover-divider'
    container.appendChild(divider)

    const label = document.createElement('p')
    label.className = 'discover-label'
    label.textContent = 'The people behind the music'
    container.appendChild(label)

    const grid = document.createElement('div')
    grid.className = 'discover-grid'

    DEMO_CREATIVES.forEach((c, i) => grid.appendChild(buildCreativeCard(c, i)))
    container.appendChild(grid)
  }

  const GENRES = ['Electronic', 'Hip Hop', 'R&B / Soul', 'Indie / Alt', 'Pop', 'Rock / Metal', 'Acoustic / Folk']

  function renderByGenre(container) {
    const pillRow = document.createElement('div')
    pillRow.className = 'discover-filters'
    pillRow.style.paddingTop = '0'
    pillRow.setAttribute('role', 'group')
    pillRow.setAttribute('aria-label', 'Genre filter')

    let selectedGenre = GENRES[0]

    function renderGenreGrid(genre) {
      let grid = document.getElementById('genre-grid')
      if (grid) grid.remove()

      const label = document.getElementById('genre-label')
      if (label) label.textContent = genre

      grid = document.createElement('div')
      grid.id = 'genre-grid'
      grid.className = 'discover-grid'

      const artists = DEMO_EMERGING.filter(a => a.genre === genre)
      if (!artists.length) {
        grid.innerHTML = `<p style="font-size:var(--text-sm);color:var(--color-text-3);padding:var(--sp-2) var(--sp-5)">No artists found for this genre yet.</p>`
      } else {
        artists.forEach((a, i) => grid.appendChild(buildArtistCard(a, i)))
      }
      container.appendChild(grid)
    }

    GENRES.forEach(g => {
      const pill = document.createElement('button')
      pill.className = 'filter-pill' + (g === selectedGenre ? ' active' : '')
      pill.textContent = g
      pill.addEventListener('click', () => {
        selectedGenre = g
        pillRow.querySelectorAll('.filter-pill').forEach(p => {
          p.classList.toggle('active', p.textContent === g)
        })
        renderGenreGrid(g)
      })
      pillRow.appendChild(pill)
    })

    container.appendChild(pillRow)

    const lbl = document.createElement('p')
    lbl.id = 'genre-label'
    lbl.className = 'discover-label'
    lbl.textContent = selectedGenre
    container.appendChild(lbl)

    renderGenreGrid(selectedGenre)
  }

  function renderNewDrops(container) {
    const label = document.createElement('p')
    label.className = 'discover-label'
    label.textContent = 'New this week'
    container.appendChild(label)

    // New drops = recent releases from non-followed artists
    const items = [
      { type: 'release', artist: 'Margot Veil', accent: '#7ec88a', title: 'Before the Rain', sub: 'New single', age: now - 3*h },
      { type: 'release', artist: 'KREYZ',       accent: '#06b6d4', title: 'Operator',        sub: 'EP · 5 tracks', age: now - 18*h },
      { type: 'release', artist: 'Tendai',      accent: '#e06b7a', title: 'Soft Hours',      sub: 'New single', age: now - 30*h },
      { type: 'release', artist: 'Caspar Black', accent: '#e05242', title: 'Glass Jaw',      sub: 'Album · 9 tracks', age: now - 72*h },
    ]

    const list = document.createElement('div')
    list.className = 'feed-items'
    list.style.padding = '0 var(--sp-5) var(--sp-4)'

    items.forEach((item, i) => {
      const rgb = hexToRgb(item.accent)
      const el = document.createElement('div')
      el.className = 'feed-item'
      el.style.animationDelay = `${i * 35}ms`
      el.innerHTML = `
        <div class="feed-item__art" style="background:rgba(${rgb},0.22);color:#f0ede8">
          ${getInitials(item.artist)}
        </div>
        <div class="feed-item__info">
          <p class="feed-item__artist">${escHtml(item.artist)}</p>
          <p class="feed-item__title">${escHtml(item.title)}</p>
          <p class="feed-item__sub">${escHtml(item.sub)}</p>
        </div>
        <div class="feed-item__meta">
          <span class="type-badge type-badge--release">Release</span>
          <span class="feed-item__time">${formatAge(item.age)}</span>
        </div>
      `
      list.appendChild(el)
    })

    container.appendChild(list)
  }

  // === NEAR ME ==============================================

  function initNearHeader() {
    const location = safeGet('fan_location', null)
    const headerSet = document.getElementById('near-header-set')
    const capture   = document.getElementById('near-location-capture')
    if (location) {
      document.getElementById('near-location-display').textContent = location
      headerSet.style.display = ''
      capture.style.display = 'none'
    } else {
      headerSet.style.display = 'none'
      capture.style.display = ''
    }
  }

  function saveNearLocation() {
    const input = document.getElementById('near-location-input')
    const val = (input.value || '').trim()
    if (!val) { input.focus(); return }
    safeSet('fan_location', val)
    document.getElementById('near-content').removeAttribute('data-rendered')
    initNearHeader()
    renderNearMe()
  }

  function resetNearLocation() {
    try { localStorage.removeItem('fan_location') } catch (_) {}
    document.getElementById('near-content').innerHTML = ''
    document.getElementById('near-content').removeAttribute('data-rendered')
    initNearHeader()
  }

  function renderNearMe() {
    initNearHeader()
    const container = document.getElementById('near-content')
    const followedIds = getFollowedIds()

    const thisWeek   = DEMO_NEAR.filter(s => parseInt(s.day) <= 20)
    const laterItems = DEMO_NEAR.filter(s => parseInt(s.day) > 20)

    function buildGroup(label, items) {
      if (!items.length) return

      const group = document.createElement('div')
      group.className = 'shows-date-group'
      group.innerHTML = `<p class="shows-date-group-label">${label}</p>`

      const list = document.createElement('div')
      list.className = 'show-items'

      items.forEach((show, i) => {
        const isFollowed = followedIds.includes(show.artistId) || show.followed
        const el = document.createElement('div')
        el.className = 'show-item'
        el.style.animationDelay = `${i * 40}ms`
        el.innerHTML = `
          <div class="show-item__date-block" aria-hidden="true">
            <div class="show-item__day">${escHtml(show.day)}</div>
            <div class="show-item__month">${escHtml(show.month)}</div>
          </div>
          <div class="show-item__info">
            <p class="show-item__artist">${escHtml(show.artist)}</p>
            <p class="show-item__venue">${escHtml(show.venue)}</p>
            <p class="show-item__city">${escHtml(show.city)} · ${escHtml(show.time)}</p>
          </div>
          ${isFollowed ? `<span class="show-item__following-badge">Following</span>` : `<button class="ticket-btn">Tickets</button>`}
        `
        list.appendChild(el)
      })

      group.appendChild(list)
      container.appendChild(group)
    }

    buildGroup('This week', thisWeek)
    buildGroup('Coming up', laterItems)

    if (!DEMO_NEAR.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__emoji">📍</div>
          <p class="empty-state__title">No shows near you in the next 3 months.</p>
          <p class="empty-state__body">We'll show you shows from artists near your location as they get added.</p>
        </div>
      `
    }

    // C19 #7 — show count badge on Near me tab when shows are found
    const _nearTab = document.getElementById('tab-near')
    if (_nearTab) {
      const _nearCount = DEMO_NEAR.length
      _nearTab.textContent = _nearCount > 0 ? `Near me (${_nearCount})` : 'Near me'
    }
  }

  // === FOLLOW TOGGLE ========================================

  function toggleFollow(artist, btn) {
    const ids = getFollowedIds()
    const isNow = ids.includes(artist.id)

    let followed = getFollowed()
    if (isNow) {
      followed = followed.filter(a => a.id !== artist.id)
    } else {
      followed.push(artist)
    }

    try {
      localStorage.setItem('able_fan_following', JSON.stringify(followed))
    } catch (_) {}

    // Update button
    const nowFollowed = !isNow
    btn.classList.toggle('following', nowFollowed)
    btn.setAttribute('aria-pressed', String(nowFollowed))
    btn.textContent = nowFollowed ? 'Following' : 'Follow'
    btn.setAttribute('aria-label', `${nowFollowed ? 'Following' : 'Follow'} ${artist.name}`)
  }

  // === SECURITY =============================================

  function escHtml(s) {
    if (!s && s !== 0) return ''
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#x27;')
  }

  // === TAB SWITCHING ========================================

  function initContentTabs() {
    const tabs  = document.querySelectorAll('.ctab')
    const views = document.querySelectorAll('.view')

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.tab

        tabs.forEach(t => {
          t.classList.toggle('active', t === tab)
          t.setAttribute('aria-selected', String(t === tab))
        })

        views.forEach(v => {
          v.classList.toggle('active', v.id === `view-${target}`)
        })

        // Lazy-render discover / near only when first activated
        if (target === 'discover' && !document.getElementById('discover-content').dataset.rendered) {
          document.getElementById('discover-content').dataset.rendered = '1'
          renderDiscover('connected')
        }
        if (target === 'near' && !document.getElementById('near-content').dataset.rendered) {
          document.getElementById('near-content').dataset.rendered = '1'
          renderNearMe()
        }
      })
    })
  }

  function initDiscoverFilters() {
    const discoverView = document.getElementById('view-discover')
    discoverView.querySelector('.discover-filters').addEventListener('click', e => {
      const pill = e.target.closest('.filter-pill')
      if (!pill) return
      discoverView.querySelectorAll('.discover-filters .filter-pill').forEach(p => {
        p.classList.toggle('active', p === pill)
        p.setAttribute('aria-selected', String(p === pill))
      })
      renderDiscover(pill.dataset.filter)
    })
  }

  // === ARRIVAL FLOW (P0.1 / P0.2 / P0.4 / P0.5) ===========

  function initArrival() {
    // 1. Parse URL parameters
    const params = new URLSearchParams(window.location.search)
    const artistSlug = params.get('artist')
    const ref = params.get('ref')
    const action = params.get('action')

    if (action === 'unsubscribe' && artistSlug) {
      const following = safeGet('able_fan_following', [])
      const leavingArtist = following.find(a => a.id === artistSlug || a.slug === artistSlug)
      const artistName = leavingArtist ? leavingArtist.name : null
      const filtered = following.filter(a => a.id !== artistSlug && a.slug !== artistSlug)
      safeSet('able_fan_following', filtered)
      // Clean URL and show confirmation toast — C14 #36
      window.history.replaceState({}, '', 'fan.html')
      requestAnimationFrame(() => {
        const toast = document.createElement('div')
        toast.setAttribute('role', 'status')
        toast.setAttribute('aria-live', 'polite')
        toast.style.cssText = 'position:fixed;bottom:calc(1.5rem + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#12152a;color:#f0ede8;font-size:13px;padding:10px 18px;border-radius:10px;box-shadow:0 4px 24px rgba(0,0,0,.5);z-index:9999;white-space:nowrap;'
        toast.textContent = artistName ? `You\u2019ve left ${artistName}\u2019s list.` : 'You\u2019ve left that artist\u2019s list.'
        document.body.appendChild(toast)
        setTimeout(() => toast.remove(), 4000)
      })
      return
    }

    if (artistSlug) {
      const following = safeGet('able_fan_following', [])
      const alreadyFollowing = following.some(a => a.id === artistSlug || a.slug === artistSlug)
      if (!alreadyFollowing) {
        // Add minimal stub — will be enriched when real data is available
        following.push({ id: artistSlug, slug: artistSlug, name: artistSlug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), accent: '#8b7cf4', genre: '' })
        safeSet('able_fan_following', following)
      }
      if (ref === 'signup' || ref === 'email-confirm') {
        safeSet('fan_first_visit_artist', artistSlug)
        safeSet('fan_first_visit_ts', Date.now())
      }
      // Clean URL
      window.history.replaceState({}, '', 'fan.html')
    }
  }

  function renderSubGreeting() {
    const el = document.getElementById('page-subgreeting')
    if (!el) return
    const followed = getFollowed()
    const feed = getFeed()
    const ONE_DAY = 86400000
    const todayItems = feed.filter(i => (Date.now() - i.age) < ONE_DAY)

    // Show tonight first, then today's count, then pre-release
    let msg = null
    const tonightShow = feed.find(i => i.type === 'event' && (Date.now() - i.age) < ONE_DAY)
    if (tonightShow) {
      const a = followed.find(f => f.id === tonightShow.artistId)
      if (a) msg = `${a.name} is playing tonight.`
    } else if (todayItems.length > 1) {
      msg = `${todayItems.length} new things from your artists today.`
    } else if (todayItems.length === 1) {
      const a = followed.find(f => f.id === todayItems[0].artistId)
      msg = `Something new from ${a ? a.name : 'an artist you follow'} today.`
    }

    if (msg) {
      el.textContent = msg
      el.style.display = 'block'
    }

    // C20 #23 — personalise Following tab heading with fan name
    try {
      const _fanName = localStorage.getItem('fan_name')
      const _followTab = document.getElementById('tab-following')
      if (_fanName && _followTab && !_followTab.dataset.personalised) {
        _followTab.textContent = `For you, ${_fanName.trim().split(' ')[0]}.`
        _followTab.dataset.personalised = '1'
      }
    } catch(_) {}
  }

  function renderFirstVisitState() {
    const firstArtistSlug = safeGet('fan_first_visit_artist', null)
    if (!firstArtistSlug) return false

    const followed = getFollowed()
    const artist = followed.find(a => a.id === firstArtistSlug || a.slug === firstArtistSlug)
    if (!artist) return false

    const feed = getFeed()
    const artistHasContent = feed.some(i => i.artistId === firstArtistSlug || i.artistId === artist.id)
    if (artistHasContent) return false // Let normal feed render handle it

    // Show first-visit empty state
    const stateEl = document.getElementById('first-visit-state')
    const titleEl = document.getElementById('first-visit-title')
    const bodyEl = document.getElementById('first-visit-body')
    if (!stateEl || !titleEl || !bodyEl) return false

    titleEl.textContent = `You followed ${artist.name}.`
    bodyEl.innerHTML = `They're here when they have something to share.<br><br>While you're here —`
    stateEl.style.display = 'block'

    // Show cold-start row beneath
    renderColdStart(artist)

    // Clear first-visit flag so it only shows once
    safeSet('fan_first_visit_ts_shown', Date.now())
    return true
  }

  function renderColdStart(fromArtist) {
    const row = document.getElementById('cold-start-row')
    const label = document.getElementById('cold-start-label')
    const grid = document.getElementById('cold-start-grid')
    if (!row || !label || !grid) return

    label.textContent = `Because you follow ${fromArtist ? fromArtist.name : 'this artist'} —`

    // Pick 2 connected artists as suggestions
    const suggestions = DEMO_CONNECTED.slice(0, 2)
    const followedIds = getFollowedIds()
    suggestions.forEach((a, i) => {
      const card = buildArtistCard(a, i, { reason: `${a.role} on ${a.via}` })
      grid.appendChild(card)
    })
    row.style.display = 'block'
  }

  function renderEmptyFollowingState() {
    const followed = getFollowed()
    const emptyEl = document.getElementById('empty-following')
    const titleEl = document.getElementById('empty-following-title')
    const bodyEl = document.getElementById('empty-following-body')
    if (!emptyEl) return

    // Check for first-visit scenario first
    if (renderFirstVisitState()) return

    // Check if we have followed artists with no recent content
    if (followed.length > 0) {
      const feed = getFeed()
      const ONE_DAY = 86400000
      const todayItems = feed.filter(i => (Date.now() - i.age) < ONE_DAY)
      if (!todayItems.length) {
        // Show context-aware "nothing new today" copy
        if (titleEl) {
          if (followed.length === 1) {
            titleEl.textContent = `Nothing new from ${followed[0].name} today.`
          } else {
            const lastItem = feed.sort((a,b) => b.age - a.age)[0]
            const lastArtist = lastItem ? followed.find(f => f.id === lastItem.artistId) : null
            const daysSinceLast = lastItem ? Math.floor((Date.now() - lastItem.age) / 86400000) : 999
            if (daysSinceLast <= 1) {
              titleEl.textContent = `Nothing new today. ${lastArtist ? lastArtist.name : 'Your artists'} shared something yesterday.`
            } else if (daysSinceLast <= 6) {
              titleEl.textContent = `Nothing new from your artists today.`
            } else {
              titleEl.textContent = `It's been a quiet week. Your artists will be back.`
            }
          }
          if (bodyEl) bodyEl.style.display = 'none'
        }
        const discoverCta = document.getElementById('empty-discover-cta')
        if (discoverCta) discoverCta.style.display = 'none'
        emptyEl.style.display = 'block'
        return
      }
    }

    // Truly empty — no artists followed: show discovery prompt (C18 #1)
    if (titleEl) titleEl.textContent = 'No one here yet.'
    if (bodyEl) {
      bodyEl.innerHTML = 'Discover artists by visiting their ABLE pages. <a href="/landing.html" style="color:var(--color-accent,#e05242);text-decoration:underline;text-underline-offset:2px;">Explore ABLE →</a>'
    }
    emptyEl.style.display = 'block'

    // Wire up Discover CTA
    const discoverCta = document.getElementById('empty-discover-cta')
    if (discoverCta) {
      discoverCta.addEventListener('click', () => {
        document.querySelector('[data-tab="discover"]')?.click()
      })
    }
  }

  // === FAN CLIP PLAYER ======================================

  let _fanClipMuted = true

  function openFanClipPlayer(clip) {
    const modal    = document.getElementById('fanClipModal')
    const videoEl  = document.getElementById('fanClipVideo')
    const caption  = document.getElementById('fanClipCaption')
    const soundBtn = document.getElementById('fanClipSoundBtn')

    let embedUrl = ''
    const u = clip.url || ''
    if (/youtube\.com|youtu\.be/.test(u)) {
      const m = /(?:v=|youtu\.be\/)([^&?/]+)/.exec(u)
      if (m) embedUrl = `https://www.youtube.com/embed/${m[1]}?autoplay=1&mute=1&playsinline=1`
    } else if (/soundcloud\.com/.test(u)) {
      embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(u)}&auto_play=true`
    }

    if (embedUrl) {
      videoEl.innerHTML = `<iframe src="${embedUrl}" allow="autoplay; fullscreen" allowfullscreen></iframe>`
    }

    caption.textContent = clip.caption || clip.title || ''
    _fanClipMuted = true
    soundBtn.textContent = '🔇 Sound off'
    soundBtn._embedBase = embedUrl

    modal.classList.add('is-open')
    document.body.style.overflow = 'hidden'
  }

  function closeFanClipPlayer() {
    const modal   = document.getElementById('fanClipModal')
    const videoEl = document.getElementById('fanClipVideo')
    modal.classList.remove('is-open')
    document.body.style.overflow = ''
    setTimeout(() => { videoEl.innerHTML = '' }, 420)
  }

  function _initFanClipPlayer() {
    const modal    = document.getElementById('fanClipModal')
    const closeBtn = document.getElementById('fanClipClose')
    const soundBtn = document.getElementById('fanClipSoundBtn')

    closeBtn.addEventListener('click', closeFanClipPlayer)

    // Swipe down to close
    let _startY = 0
    modal.addEventListener('touchstart', e => { _startY = e.touches[0].clientY }, { passive: true })
    modal.addEventListener('touchend', e => {
      if (e.changedTouches[0].clientY - _startY > 80) closeFanClipPlayer()
    }, { passive: true })

    soundBtn.addEventListener('click', () => {
      _fanClipMuted = !_fanClipMuted
      soundBtn.textContent = _fanClipMuted ? '🔇 Sound off' : '🔊 Sound on'
      const iframe = document.querySelector('#fanClipVideo iframe')
      if (iframe && soundBtn._embedBase) {
        iframe.src = _fanClipMuted
          ? soundBtn._embedBase
          : soundBtn._embedBase.replace('mute=1', 'mute=0')
      }
    })
  }

  // === INIT =================================================

  function init() {
    // C16 #1 — read previous visit before overwriting (so "New" badge can fire on this visit)
    try { _prevLastVisit = parseInt(localStorage.getItem('fan_last_visit') || '0', 10) || 0; } catch (_) {}
    // C16 #5 — record last visit timestamp for "New" badge calculation
    try { localStorage.setItem('fan_last_visit', Date.now()); } catch (_) {}
    initArrival()
    renderFollowing()
    renderSubGreeting()
    initContentTabs()
    initDiscoverFilters()
    _initFanClipPlayer()
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init)
  } else {
    init()
  }
</script>

<script>
  // === SERVICE WORKER REGISTRATION =============================
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

  // === OFFLINE INDICATOR =======================================
  const offlineBar = document.getElementById('offline-bar');
  function updateOnlineStatus() {
    offlineBar.classList.toggle('visible', !navigator.onLine);
  }
  window.addEventListener('online',  updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // === INSTALL HINT ============================================
  (function () {
    const HINT_KEY     = 'able_pwa_hint_dismissed';
    const VISITS_KEY   = 'able_pwa_visits';
    const VISITS_THRESHOLD = 3;

    if (localStorage.getItem(HINT_KEY)) return;

    const visits = parseInt(localStorage.getItem(VISITS_KEY) || '0', 10) + 1;
    localStorage.setItem(VISITS_KEY, visits);
    if (visits < VISITS_THRESHOLD) return;

    const hint    = document.getElementById('install-hint');
    const sub     = document.getElementById('install-hint-sub');
    const btn     = document.getElementById('install-hint-btn');
    const dismiss = document.getElementById('install-hint-dismiss');

    const isIOS         = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone  = window.matchMedia('(display-mode: standalone)').matches
                          || window.navigator.standalone === true;

    if (isStandalone) return; // already installed

    function showHint() {
      requestAnimationFrame(() => hint.classList.add('visible'));
    }
    function hideHint() {
      hint.classList.remove('visible');
      localStorage.setItem(HINT_KEY, '1');
    }

    dismiss.addEventListener('click', hideHint);

    if (isIOS) {
      // iOS can't auto-prompt — show share instructions
      sub.textContent = 'Tap Share → Add to Home Screen';
      btn.textContent = 'Got it';
      btn.addEventListener('click', hideHint);
      setTimeout(showHint, 1500);
      return;
    }

    // Android / Chrome: wait for beforeinstallprompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(showHint, 1500);
    });

    btn.addEventListener('click', async () => {
      if (!deferredPrompt) { hideHint(); return; }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      hideHint();
    });
  })();
</script>
</body>
</html>
