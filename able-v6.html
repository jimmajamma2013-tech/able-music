<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0e1a">
  <title>ABLE</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Eager: DM Sans (body, all vibes) + Barlow Condensed (Electronic, Pop — default shell) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Barlow+Condensed:wght@700&display=swap&subset=latin">

  <style>
    /* ============================================================
       ABLE v6 — Checkpoint 1: Shell + Design System Tokens
       Authority: docs/v6/core/V6_BUILD_AUTHORITY.md
       ============================================================ */

    /* === §3.3 STATIC TOKENS ===================================== */
    :root {
      --font-body:    'DM Sans', system-ui, sans-serif;
      --font-d:       'Barlow Condensed', system-ui, sans-serif; /* overridden by vibe */
      --font-d-weight:  700;
      --font-d-style:   normal;
      --font-d-transform: none;

      /* Spacing */
      --sp-1: 4px;  --sp-2: 8px;   --sp-3: 12px; --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px;  --sp-8: 32px; --sp-10: 40px;
      --sp-12: 48px; --sp-16: 64px;

      --tap-min: 44px;

      /* Typography scale */
      --text-xs:   11px; --text-sm:   13px; --text-base: 15px;
      --text-lg:   17px; --text-xl:   20px; --text-2xl:  24px;
      --text-3xl:  32px; --text-4xl:  40px;
      --text-hero: clamp(48px, 14vw, 80px);

      /* Line heights */
      --lh-tight:   0.88;
      --lh-display: 1.0;
      --lh-body:    1.5;
      --lh-label:   1.2;

      /* Radii */
      --r-pill: 999px;
      /* --r-sm/md/lg/xl computed by applyDerivedTokens() — defaults below */
      --r-sm: 4px; --r-md: 8px; --r-lg: 16px; --r-xl: 24px;

      /* Vibe letter spacing defaults (overridden per vibe) */
      --ls-d:     0em;
      --ls-label: 0.12em;

      /* Easing */
      --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-decel:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-accel:    cubic-bezier(0.55, 0, 1, 0.45);
      --ease-standard: cubic-bezier(0.4, 0.0, 0.2, 1.0);

      /* Durations */
      --dur-instant: 80ms;
      --dur-fast:    150ms;
      --dur-mid:     250ms;
      --dur-slow:    400ms;
      --dur-xslow:   600ms;

      /* Campaign state colours */
      --color-state-pre:  #fbbf24;
      --color-state-live: #ef4444;
      --color-state-gig:  #8b1e1e;
      --color-state-prof: #06b6d4;

      /* Ambient colour — overridden by canvas extraction (§3.6) */
      --color-ambient: 0,0,0;

      /* Accent defaults — overridden by applyDerivedTokens() */
      --color-accent:      #7ec88a;
      --color-accent-rgb:  126,200,138;
      --color-accent-glow: rgba(126,200,138,0.35);
      --color-accent-soft: rgba(126,200,138,0.12);

      /* Tab bar height (used for scroll padding) */
      --tab-bar-height: 64px;
    }

    /* === §3.2 THEME TOKENS ====================================== */
    [data-theme="dark"] {
      --color-bg:          #0d0e1a;
      --color-surface:     #111427;
      --color-card:        #12152a;
      --color-card-raised: #1a1e38;
      --color-border:      rgba(255,255,255,0.06);
      --color-text:        #f0ede8;
      --color-text-2:      rgba(240,237,232,0.6);
      --color-text-3:      rgba(240,237,232,0.35);
      --color-overlay:     rgba(13,14,26,0.7);
      --shadow-card:       0 2px 16px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --color-bg:          #f0ede8;
      --color-surface:     #e8e4de;
      --color-card:        #ffffff;
      --color-card-raised: #f8f5f2;
      --color-border:      rgba(0,0,0,0.08);
      --color-text:        #0d0e1a;
      --color-text-2:      rgba(13,14,26,0.6);
      --color-text-3:      rgba(13,14,26,0.35);
      --color-overlay:     rgba(240,237,232,0.7);
      --shadow-card:       0 2px 16px rgba(0,0,0,0.08);
    }

    [data-theme="glass"] {
      --color-bg:          transparent;
      --color-surface:     rgba(255,255,255,0.06);
      --color-card:        rgba(255,255,255,0.08);
      --color-card-raised: rgba(255,255,255,0.12);
      --color-border:      rgba(255,255,255,0.12);
      --color-text:        #f0ede8;
      --color-text-2:      rgba(240,237,232,0.7);
      --color-text-3:      rgba(240,237,232,0.4);
      --backdrop:          blur(28px) saturate(180%);
    }

    [data-theme="contrast"] {
      --color-bg:          #000000;
      --color-surface:     #0a0a0a;
      --color-card:        #111111;
      --color-card-raised: #1a1a1a;
      --color-border:      rgba(255,255,255,0.2);
      --color-text:        #ffffff;
      --color-text-2:      rgba(255,255,255,0.8);
      --color-text-3:      rgba(255,255,255,0.5);
      --shadow-card:       0 2px 16px rgba(0,0,0,0.8);
    }

    /* === §3.1 VIBE CLASSES ====================================== */
    /* CSS sets --font-d family + letter spacing; JS calls applyDerivedTokens
       for accent + radius (r-mult not safe as CSS custom property in calc) */

    [data-vibe="electronic"] {
      --font-d: 'Barlow Condensed', system-ui, sans-serif;
      --font-d-weight: 700;
      --font-d-style: normal;
      --font-d-transform: uppercase;
      --ls-d: 0.06em;
      --ls-label: 0.22em;
    }

    [data-vibe="hiphop"] {
      --font-d: 'Oswald', system-ui, sans-serif;
      --font-d-weight: 700;
      --font-d-style: normal;
      --font-d-transform: uppercase;
      --ls-d: 0em;
      --ls-label: 0.28em;
    }

    [data-vibe="rnb"] {
      --font-d: 'Cormorant Garamond', Georgia, serif;
      --font-d-weight: 600;
      --font-d-style: italic;
      --font-d-transform: none;
      --ls-d: 0.02em;
      --ls-label: 0.12em;
    }

    [data-vibe="indie"] {
      --font-d: 'Space Grotesk', system-ui, sans-serif;
      --font-d-weight: 700;
      --font-d-style: normal;
      --font-d-transform: none;
      --ls-d: -0.01em;
      --ls-label: 0.08em;
    }

    [data-vibe="pop"] {
      --font-d: 'Barlow Condensed', system-ui, sans-serif;
      --font-d-weight: 700;
      --font-d-style: normal;
      --font-d-transform: none;
      --ls-d: 0.04em;
      --ls-label: 0.16em;
    }

    [data-vibe="rock"] {
      --font-d: 'Oswald', system-ui, sans-serif;
      --font-d-weight: 700;
      --font-d-style: normal;
      --font-d-transform: uppercase;
      --ls-d: 0.08em;
      --ls-label: 0.2em;
    }

    [data-vibe="acoustic"] {
      --font-d: 'Lora', Georgia, serif;
      --font-d-weight: 700;
      --font-d-style: normal;
      --font-d-transform: none;
      --ls-d: 0.01em;
      --ls-label: 0.10em;
    }

    /* === RESET & BASE =========================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      height: 100%;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--lh-body);
      color: var(--color-text);
      background-color: #0d0e1a; /* fallback before shell theme loads */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Desktop backdrop — dark surround behind the phone shell */
    @media (min-width: 500px) {
      body {
        background-color: #080810;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 100dvh;
      }
    }

    /* === GLASS BACKGROUND ======================================= */
    /* Fixed blurred artwork behind the glass theme shell */
    #glass-bg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: -1;
      background-size: cover;
      background-position: center top;
      filter: blur(40px) brightness(0.45);
      transform: scale(1.1); /* prevents blur edge showing */
    }

    [data-theme="glass"] ~ #glass-bg,
    body:has([data-theme="glass"]) #glass-bg {
      display: block;
    }

    /* === APP SHELL ============================================== */
    #app-shell {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      margin: 0 auto;
      background-color: var(--color-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    @media (min-width: 500px) {
      #app-shell {
        box-shadow: 0 0 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
      }
    }

    /* Glass shell needs no bg of its own — relies on #glass-bg behind it */
    [data-theme="glass"]#app-shell {
      background-color: transparent;
    }

    /* === STATUS BAR (safe area inset) =========================== */
    #status-bar {
      height: env(safe-area-inset-top, 0px);
      min-height: 0;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* === SCROLL CONTAINER ======================================= */
    #scroll-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding-bottom: calc(var(--tab-bar-height) + env(safe-area-inset-bottom, 0px) + var(--sp-4));
    }

    /* Scroll track hidden but functional */
    #scroll-container::-webkit-scrollbar { display: none; }
    #scroll-container { scrollbar-width: none; }

    /* === TAB BAR ================================================ */
    #tab-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: calc(var(--tab-bar-height) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background-color: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      transition: transform var(--dur-mid) var(--ease-accel);
      will-change: transform;
    }

    /* Glass tab bar gets backdrop blur */
    [data-theme="glass"] ~ #tab-bar,
    body:has([data-theme="glass"]) #tab-bar {
      background-color: rgba(17,20,39,0.6);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }

    #tab-bar.tab-bar--hidden {
      transform: translateX(-50%) translateY(100%);
    }

    .tab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-1);
      min-width: var(--tap-min);
      min-height: var(--tap-min);
      padding: var(--sp-2) var(--sp-3);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-3);
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color var(--dur-fast) var(--ease-standard),
                  transform var(--dur-fast) var(--ease-spring);
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn:active {
      transform: scale(0.92);
    }

    .tab-btn[aria-selected="true"] {
      color: var(--color-accent);
    }

    .tab-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      stroke: currentColor;
    }

    /* Active indicator dot */
    .tab-dot {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: var(--color-accent);
      transition: transform var(--dur-fast) var(--ease-spring),
                  opacity var(--dur-fast) var(--ease-standard);
      opacity: 0;
    }

    .tab-btn[aria-selected="true"] .tab-dot {
      transform: translateX(-50%) scale(1);
      opacity: 1;
    }

    /* === GLOBAL PRESS SCALE (interaction #1) ==================== */
    /* Applied to all interactive elements via JS pointer events */
    .pressable {
      transition: transform var(--dur-fast) var(--ease-spring);
      will-change: transform;
    }
    .pressable:active,
    .pressable.pressing {
      transform: scale(0.97);
    }

    /* === FOCUS STYLES (WCAG 2.2 AA §5) ========================= */
    :focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 3px;
      border-radius: var(--r-sm);
    }

    /* === REDUCED MOTION (§5.1) ================================== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* === CHECKPOINT 1 PLACEHOLDER ============================== */
    /* Temporary — shows shell is working before Checkpoint 2 content */
    .c1-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: var(--sp-4);
      padding: var(--sp-8);
      text-align: center;
    }

    .c1-placeholder__title {
      font-family: var(--font-d);
      font-size: var(--text-4xl);
      font-weight: var(--font-d-weight);
      font-style: var(--font-d-style);
      text-transform: var(--font-d-transform);
      letter-spacing: var(--ls-d);
      color: var(--color-text);
      line-height: var(--lh-display);
    }

    .c1-placeholder__sub {
      font-size: var(--text-sm);
      color: var(--color-text-3);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .c1-accent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--color-accent);
      box-shadow: 0 0 12px var(--color-accent-glow);
    }
  </style>
</head>
<body>

  <!-- Glass full-bleed blurred background (glass theme only) -->
  <div id="glass-bg" aria-hidden="true"></div>

  <!-- ============================================================
       APP SHELL
       data-theme: dark | light | glass | contrast
       data-vibe:  electronic | hiphop | rnb | indie | pop | rock | acoustic
       ============================================================ -->
  <div id="app-shell" data-theme="dark" data-vibe="indie">

    <!-- iOS safe area top -->
    <div id="status-bar" aria-hidden="true"></div>

    <!-- Main scroll area -->
    <main id="scroll-container" tabindex="-1" aria-label="Artist profile">

      <!-- Checkpoint 1 placeholder — replaced by Checkpoint 2 hero -->
      <div class="c1-placeholder" id="c1-placeholder">
        <div class="c1-accent-dot"></div>
        <h1 class="c1-placeholder__title">ABLE</h1>
        <p class="c1-placeholder__sub">Shell · Tokens · Checkpoint 1</p>
      </div>

    </main>

    <!-- Tab bar (fixed) -->
    <nav id="tab-bar" role="tablist" aria-label="Profile sections">

      <button class="tab-btn pressable" role="tab" aria-selected="true"
              aria-controls="panel-home" data-tab="home" id="tab-home">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
        <span class="tab-dot" aria-hidden="true"></span>
      </button>

      <button class="tab-btn pressable" role="tab" aria-selected="false"
              aria-controls="panel-music" data-tab="music" id="tab-music">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <span>Listen</span>
        <span class="tab-dot" aria-hidden="true"></span>
      </button>

      <button class="tab-btn pressable" role="tab" aria-selected="false"
              aria-controls="panel-shows" data-tab="shows" id="tab-shows">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Shows</span>
        <span class="tab-dot" aria-hidden="true"></span>
      </button>

      <button class="tab-btn pressable" role="tab" aria-selected="false"
              aria-controls="panel-merch" data-tab="merch" id="tab-merch">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span>Merch</span>
        <span class="tab-dot" aria-hidden="true"></span>
      </button>

      <button class="tab-btn pressable" role="tab" aria-selected="false"
              aria-controls="panel-support" data-tab="support" id="tab-support">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <span>Support</span>
        <span class="tab-dot" aria-hidden="true"></span>
      </button>

    </nav>

  </div><!-- /#app-shell -->

  <script>
    'use strict';

    /* ============================================================
       ABLE v6 — Core JS: tokens, vibes, shell init
       ============================================================ */

    // === UTILITY =================================================

    function hexToRgb(hex) {
      const c = hex.replace('#', '')
      return [
        parseInt(c.slice(0, 2), 16),
        parseInt(c.slice(2, 4), 16),
        parseInt(c.slice(4, 6), 16)
      ]
    }

    // === §3.4 DERIVED TOKEN APPLICATION ==========================

    function applyDerivedTokens(root, accentHex, rMult) {
      const [r, g, b] = hexToRgb(accentHex)
      root.style.setProperty('--color-accent',      accentHex)
      root.style.setProperty('--color-accent-rgb',  `${r},${g},${b}`)
      root.style.setProperty('--color-accent-glow', `rgba(${r},${g},${b},0.35)`)
      root.style.setProperty('--color-accent-soft', `rgba(${r},${g},${b},0.12)`)
      root.style.setProperty('--r-sm',  `${Math.round(4  * rMult)}px`)
      root.style.setProperty('--r-md',  `${Math.round(8  * rMult)}px`)
      root.style.setProperty('--r-lg',  `${Math.round(16 * rMult)}px`)
      root.style.setProperty('--r-xl',  `${Math.round(24 * rMult)}px`)
    }

    // === §3.1 VIBE CONFIGURATION ==================================

    const VIBES = {
      electronic: { font: 'Barlow Condensed', googleFont: null,                              accent: '#06b6d4', rMult: 0.6 },
      hiphop:     { font: 'Oswald',           googleFont: 'Oswald:wght@700',                 accent: '#f4b942', rMult: 0.7 },
      rnb:        { font: 'Cormorant Garamond',googleFont: 'Cormorant+Garamond:ital,wght@1,600', accent: '#e06b7a', rMult: 1.2 },
      indie:      { font: 'Space Grotesk',    googleFont: 'Space+Grotesk:wght@700',          accent: '#7ec88a', rMult: 1.0 },
      pop:        { font: 'Barlow Condensed', googleFont: null,                              accent: '#9b7cf4', rMult: 1.4 },
      rock:       { font: 'Oswald',           googleFont: 'Oswald:wght@700',                 accent: '#e05242', rMult: 0.6 },
      acoustic:   { font: 'Lora',             googleFont: 'Lora:wght@700',                   accent: '#d4a96a', rMult: 1.3 },
    }

    const _loadedFonts = new Set(['Barlow Condensed', 'DM Sans'])

    function loadVibeFont(vibe) {
      const cfg = VIBES[vibe]
      if (!cfg || !cfg.googleFont || _loadedFonts.has(cfg.font)) return Promise.resolve()
      return new Promise(resolve => {
        const link = document.createElement('link')
        link.rel  = 'stylesheet'
        link.href = `https://fonts.googleapis.com/css2?family=${cfg.googleFont}&display=swap&subset=latin`
        link.onload  = resolve
        link.onerror = resolve // degrade cleanly
        document.head.appendChild(link)
        _loadedFonts.add(cfg.font)
      })
    }

    // applyVibe: sets data-vibe on shell (CSS picks up font/spacing tokens),
    // loads font if needed, then applies accent + radius via JS
    function applyVibe(vibe, shell) {
      const cfg = VIBES[vibe]
      if (!cfg) return
      shell.dataset.vibe = vibe
      // Load font, then apply derived tokens
      loadVibeFont(vibe).then(() => {
        const profile = getProfile()
        const accent = profile.accent || cfg.accent
        applyDerivedTokens(shell, accent, cfg.rMult)
      })
    }

    // === PROFILE =================================================

    function getProfile() {
      try {
        return JSON.parse(localStorage.getItem('able_v3_profile') || '{}')
      } catch (_) {
        return {}
      }
    }

    // === §3.6 AMBIENT COLOUR EXTRACTION ==========================

    function extractAmbientColour(imgEl, root) {
      try {
        const canvas = document.createElement('canvas')
        const ctx = canvas.getContext('2d')
        canvas.width = 4; canvas.height = 4
        ctx.drawImage(imgEl, 0, 0, 4, 4)
        const d = ctx.getImageData(0, 0, 4, 4).data
        let r = 0, g = 0, b = 0
        for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2] }
        const n = d.length / 4
        root.style.setProperty(
          '--color-ambient',
          `${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)}`
        )
      } catch (_) {
        // CORS / taint — stays at default 0,0,0. Degrades cleanly.
      }
    }

    // === CAMPAIGN STATE MACHINE (§6.3) ===========================

    function computeState(profile) {
      if (profile.stateOverride && profile.stateOverride !== 'auto') return profile.stateOverride
      const now = Date.now()
      // Gig state: check able_gig_expires
      const gigExpires = parseInt(localStorage.getItem('able_gig_expires') || '0', 10)
      if (gigExpires && now < gigExpires) return 'gig'
      // Release-based states
      const release = profile.releaseDate ? new Date(profile.releaseDate).getTime() : null
      if (!release) return 'profile'
      if (now < release) return 'pre-release'
      if (now < release + 14 * 86400000) return 'live'
      return 'profile'
    }

    // === TAB BAR =================================================

    function initTabBar(shell) {
      const tabs = shell.querySelectorAll('.tab-btn')
      const scrollEl = document.getElementById('scroll-container')

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          if (tab.getAttribute('aria-selected') === 'true') {
            // Already active: scroll to top (interaction #11)
            scrollEl.scrollTo({ top: 0, behavior: 'smooth' })
            return
          }
          tabs.forEach(t => t.setAttribute('aria-selected', 'false'))
          tab.setAttribute('aria-selected', 'true')
        })

        // Press scale (interaction #1)
        tab.addEventListener('pointerdown', () => tab.classList.add('pressing'))
        tab.addEventListener('pointerup',   () => tab.classList.remove('pressing'))
        tab.addEventListener('pointerleave',() => tab.classList.remove('pressing'))
      })
    }

    // === TAB BAR HIDE/SHOW ON SCROLL (interaction #15) ===========

    function initScrollHide() {
      const scrollEl = document.getElementById('scroll-container')
      const tabBar   = document.getElementById('tab-bar')
      const THRESHOLD = 100
      let lastY = 0
      let ticking = false

      scrollEl.addEventListener('scroll', () => {
        if (ticking) return
        ticking = true
        requestAnimationFrame(() => {
          const y = scrollEl.scrollTop
          if (y - lastY > 0 && y > THRESHOLD) {
            tabBar.classList.add('tab-bar--hidden')
          } else if (lastY - y > 0) {
            tabBar.classList.remove('tab-bar--hidden')
          }
          lastY = y
          ticking = false
        })
      }, { passive: true })
    }

    // === GLOBAL PRESS SCALE INIT =================================

    function initPressScale() {
      // iOS :active fix
      document.addEventListener('touchstart', () => {}, { passive: true })

      // All .pressable elements get pointer press scale
      document.addEventListener('pointerdown', e => {
        const el = e.target.closest('.pressable')
        if (el) el.classList.add('pressing')
      })
      document.addEventListener('pointerup', e => {
        document.querySelectorAll('.pressing').forEach(el => el.classList.remove('pressing'))
      })
      document.addEventListener('pointercancel', () => {
        document.querySelectorAll('.pressing').forEach(el => el.classList.remove('pressing'))
      })
    }

    // === ANDROID BACK GESTURE (§6.5) =============================

    function initBackGesture() {
      window.addEventListener('popstate', e => {
        if (e.state && e.state.panel) {
          // Close the open panel — implemented in Checkpoint 2+
          window.dispatchEvent(new CustomEvent('able:panel:close', { detail: e.state.panel }))
        }
      })
    }

    // === INIT ====================================================

    function init() {
      const shell = document.getElementById('app-shell')
      const profile = getProfile()

      // Apply theme
      const theme = profile.theme || 'dark'
      shell.dataset.theme = theme

      // Sync glass bg with artwork if available (Checkpoint 2 will set this properly)
      if (theme === 'glass') {
        const glassBg = document.getElementById('glass-bg')
        if (glassBg && profile.topCard && profile.topCard.artworkUrl) {
          glassBg.style.backgroundImage = `url(${profile.topCard.artworkUrl})`
        }
      }

      // Apply vibe (loads font, sets tokens, applies accent + radius)
      const vibe = profile.vibe || 'indie'
      applyVibe(vibe, shell)

      // Boot UI systems
      initTabBar(shell)
      initScrollHide()
      initPressScale()
      initBackGesture()

      // Expose globals for Checkpoint 2+ to use
      window.ABLE = {
        getProfile,
        applyDerivedTokens,
        applyVibe,
        extractAmbientColour,
        computeState,
        hexToRgb,
        VIBES,
        shell,
      }
    }

    // Run after DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init)
    } else {
      init()
    }

    // CHECKPOINT 1 COMPLETE — Shell + tokens
  </script>

</body>
</html>
