<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>ABLE — No connection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d0e1a;
      color: #e4dfd2;
      font-family: 'DM Sans', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap { padding: 32px 24px; max-width: 360px; }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-type { font-size: 20px; font-weight: 700; letter-spacing: 0.08em; color: #e4dfd2; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 12px; color: #e4dfd2; }
    p { font-size: 15px; line-height: 1.55; color: rgba(228,223,210,0.6); }
    .retry {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 24px;
      background: none;
      border: 1px solid rgba(228,223,210,0.25);
      border-radius: 100px;
      color: #e4dfd2;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
    }
    .retry:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="8" height="28" viewBox="0 0 24 90" fill="none" aria-hidden="true">
        <rect x="4" y="2" width="16" height="64" fill="#e4dfd2"/>
        <rect x="4" y="66" width="16" height="20" fill="#c9b76c"/>
      </svg>
      <span class="logo-type">ABLE</span>
    </div>
    <h1>You're offline</h1>
    <p>This page will load when you're back online. Check your connection and try again.</p>
    <button class="retry" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
