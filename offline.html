<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0d0e1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Barlow+Condensed:wght@700&display=swap">
  <title>You're offline — ABLE</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0e1a;
      --card:#12152a;
      --text:#e8e9f0;
      --muted:#6b7280;
      --accent:#e05242;
      --font:'DM Sans',system-ui,sans-serif;
      --font-d:'Barlow Condensed',system-ui,sans-serif;
    }
    html,body{
      height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font);
      -webkit-font-smoothing:antialiased;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100dvh;
      padding:24px;
    }
    .container{
      text-align:center;
      max-width:320px;
      width:100%;
    }
    .wordmark{
      font-family:var(--font-d);
      font-weight:700;
      font-size:28px;
      letter-spacing:.08em;
      color:var(--text);
      opacity:.4;
      margin-bottom:40px;
    }
    .signal-icon{
      width:64px;
      height:64px;
      margin:0 auto 28px;
      opacity:.25;
    }
    h1{
      font-family:var(--font-d);
      font-weight:700;
      font-size:clamp(28px,8vw,36px);
      letter-spacing:.01em;
      line-height:1.1;
      margin-bottom:14px;
    }
    p{
      font-size:15px;
      line-height:1.6;
      color:var(--muted);
      margin-bottom:32px;
    }
    .btn{
      display:inline-block;
      padding:14px 28px;
      background:var(--accent);
      color:#fff;
      font-family:var(--font);
      font-size:15px;
      font-weight:500;
      border:none;
      border-radius:12px;
      cursor:pointer;
      min-height:44px;
      min-width:44px;
      transition:opacity .15s ease;
    }
    .btn:active{opacity:.75}
  </style>
</head>
<body>
  <div class="container">
    <div class="wordmark">ABLE</div>
    <svg class="signal-icon" viewBox="0 0 64 64" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="44" width="8" height="16" rx="2" fill="currentColor"/>
      <rect x="16" y="32" width="8" height="28" rx="2" fill="currentColor" opacity=".35"/>
      <rect x="28" y="20" width="8" height="40" rx="2" fill="currentColor" opacity=".2"/>
      <rect x="40" y="8" width="8" height="52" rx="2" fill="currentColor" opacity=".12"/>
      <line x1="8" y1="56" x2="56" y2="8" stroke="currentColor" stroke-width="4" stroke-linecap="round" opacity=".6"/>
    </svg>
    <h1>You're offline.</h1>
    <p>Check your connection and try again.<br>Your data is saved locally — nothing's been lost.</p>
    <button class="btn" onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
